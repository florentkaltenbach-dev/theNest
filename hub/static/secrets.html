<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Secrets</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#f5f5f5;color:#1a1a2e;font:14px/1.45 system-ui,sans-serif}.top{background:#1a1a2e;color:#fff;padding:12px 16px}.nav a{color:#8b8fa3;text-decoration:none;margin-right:12px;font-weight:700;font-size:12px}.nav a.active{color:#fff}.page{max-width:860px;margin:0 auto;padding:16px}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px;border-bottom:1px solid #f0f0f0;background:#fff}.row:first-child{border-top-left-radius:12px;border-top-right-radius:12px}.row:last-child{border-bottom:0;border-bottom-left-radius:12px;border-bottom-right-radius:12px}.k,.v{font-family:monospace}.v{font-size:12px;color:#777}.btn,input{font:inherit}.btn{border:0;border-radius:8px;padding:8px 12px;cursor:pointer}.dark{background:#1a1a2e;color:#fff}.red{color:#ef4444;background:transparent}.form{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;display:grid;gap:8px}.input{background:#f5f5f5;border:1px solid #e5e7eb;border-radius:8px;padding:10px}</style></head><body><div class="top"><div class="nav"><a href="/">Servers</a><a href="/secrets" class="active">Secrets</a><a href="/settings">Settings</a></div></div><div class="page"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h1>Secrets</h1><button class="btn dark" id="toggle">+ Add</button></div><div id="form" hidden class="form"><input id="key" class="input" placeholder="KEY_NAME"><input id="val" class="input" placeholder="value"><button class="btn dark" id="save">Save</button></div><div id="app">Loading…</div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const app=document.getElementById("app"),form=document.getElementById("form");const esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));async function api(p,o={}){const h={...(o.headers||{}),Authorization:"Bearer "+t};if(o.body)h["Content-Type"]="application/json";const r=await fetch("/api"+p,{...o,headers:h});if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";throw new Error("Unauthorized")}const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||("API error "+r.status));return d}async function load(){try{const d=await api("/secrets");app.innerHTML=(d.secrets||[]).map(s=>'<div class="row"><div><div class="k">'+esc(s.key)+'</div><div class="v">'+esc(s.masked)+'</div></div>'+(s.editable?'<button class="btn red" data-del="'+esc(s.key)+'">✕</button>':'')+'</div>').join("")||"<div>No secrets</div>";document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{if(confirm("Delete "+b.dataset.del+"?")){await api("/secrets/"+encodeURIComponent(b.dataset.del),{method:"DELETE"});load();}})}catch(e){app.textContent=e.message||"Failed"}}document.getElementById("toggle").onclick=()=>form.hidden=!form.hidden;document.getElementById("save").onclick=async()=>{const key=document.getElementById("key").value.trim(),value=document.getElementById("val").value;if(!key)return;await api("/secrets",{method:"POST",body:JSON.stringify({key,value})});document.getElementById("key").value="";document.getElementById("val").value="";form.hidden=true;load()};load();</script></body></html>
