<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Terminal</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#0d0d1a;color:#e0e0e0;font:14px/1.4 ui-monospace,monospace}header{padding:12px 16px;background:#16162a;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:12px}header a{color:#7eb8ff;text-decoration:none;font-weight:700;font-family:system-ui,sans-serif}.title{font-family:system-ui,sans-serif;font-weight:700}.term{padding:12px;height:calc(100vh - 64px);overflow:auto;white-space:pre-wrap;outline:none}.muted{color:#888}</style></head><body><header><a href="/tasks">Back</a><div class="title" id="title">Terminal</div></header><div id="term" class="term" tabindex="0"></div><script>const token=localStorage.getItem("nest_token");if(!token)location.href="/login";const q=new URLSearchParams(location.search);const cmd=q.get("cmd")||"";const session=q.get("session")||"";document.getElementById("title").textContent=session||cmd||"Terminal";const el=document.getElementById("term");const proto=location.protocol==="https:"?"wss:":"ws:";let url=proto+"//"+location.host+"/ws/terminal?token="+encodeURIComponent(token);if(cmd)url+="&cmd="+encodeURIComponent(cmd);if(session)url+="&session="+encodeURIComponent(session);const ws=new WebSocket(url);function out(s){el.textContent+=s;el.scrollTop=el.scrollHeight}ws.onopen=()=>{out("\\n");setTimeout(()=>ws.send(JSON.stringify({type:"resize",cols:120,rows:40})),50)};ws.onmessage=e=>out(typeof e.data==="string"?e.data:"");ws.onclose=e=>out("\\n\\n--- Session ended ("+e.code+") ---\\n");ws.onerror=()=>out("\\n\\nWebSocket error\\n");el.focus();window.addEventListener("keydown",e=>{if(ws.readyState!==1)return;if((e.ctrlKey||e.metaKey)&&["c","v","l","r"].includes(e.key.toLowerCase()))return;if(e.key==="Backspace"){ws.send("\u007f");e.preventDefault();return}if(e.key==="Enter"){ws.send("\r");e.preventDefault();return}if(e.key==="Tab"){ws.send("\t");e.preventDefault();return}if(e.key.length===1&&!e.altKey){ws.send(e.key);e.preventDefault();return}if(e.key==="ArrowUp"){ws.send("\u001b[A");e.preventDefault()}if(e.key==="ArrowDown"){ws.send("\u001b[B");e.preventDefault()}if(e.key==="ArrowRight"){ws.send("\u001b[C");e.preventDefault()}if(e.key==="ArrowLeft"){ws.send("\u001b[D");e.preventDefault()}});</script></body></html>
