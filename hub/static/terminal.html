<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nest — Terminal</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/vendor/xterm/xterm.css">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #0d0d1a;
      color: #e0e0e0;
      font: 14px/1.4 system-ui, sans-serif;
      overflow: hidden;
    }
    header {
      height: 49px;
      padding: 12px 16px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header a {
      color: #7eb8ff;
      text-decoration: none;
      font-weight: 700;
    }
    .title {
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .tools {
      height: 44px;
      padding: 6px 8px;
      background: #111125;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tool {
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #1f1f36;
      color: #e0e0e0;
      min-width: 38px;
      height: 32px;
      padding: 0 10px;
      font: 700 13px/1 system-ui, sans-serif;
      white-space: nowrap;
    }
    .tool:active { background: #2a2a4a; }
    #term {
      height: calc(100vh - 93px);
      width: 100vw;
      padding: 8px;
      background: #0d0d1a;
    }
    .xterm { height: 100%; }
    .xterm-viewport { background: #0d0d1a !important; }
  </style>
  <script src="/sidebar.js"></script>
</head>
<body>
  <header>
    <a href="/tasks">Back</a>
    <div class="title" id="title">Terminal</div>
  </header>
  <div class="tools" aria-label="Terminal controls">
    <button class="tool" data-send="&#x1b;[A" title="Up arrow">↑</button>
    <button class="tool" data-send="&#x1b;[B" title="Down arrow">↓</button>
    <button class="tool" data-send="&#x1b;[D" title="Left arrow">←</button>
    <button class="tool" data-send="&#x1b;[C" title="Right arrow">→</button>
    <button class="tool" data-send="&#x09;" title="Tab">Tab</button>
    <button class="tool" data-send="&#x03;" title="Ctrl-C">Ctrl-C</button>
    <button class="tool" id="paste" title="Paste from clipboard">Paste</button>
    <button class="tool" id="copy" title="Copy selected terminal text">Copy</button>
  </div>
  <div id="term"></div>

  <script src="/vendor/xterm/xterm.js"></script>
  <script>
    const token = localStorage.getItem('nest_token');
    if (!token) location.href = '/login';

    const q = new URLSearchParams(location.search);
    const cmd = q.get('cmd') || '';
    const session = q.get('session') || '';
    document.getElementById('title').textContent = session || cmd || 'Terminal';

    const container = document.getElementById('term');
    const term = new Terminal({
      cursorBlink: true,
      convertEol: false,
      scrollback: 5000,
      fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace',
      fontSize: 14,
      lineHeight: 1.15,
      theme: {
        background: '#0d0d1a',
        foreground: '#e0e0e0',
        cursor: '#e0e0e0',
        selectionBackground: '#3f4d7a'
      }
    });
    term.open(container);
    term.focus();

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    let url = proto + '//' + location.host + '/ws/terminal?token=' + encodeURIComponent(token);
    if (cmd) url += '&cmd=' + encodeURIComponent(cmd);
    if (session) url += '&session=' + encodeURIComponent(session);

    const ws = new WebSocket(url);

    function send(data) {
      if (ws.readyState === WebSocket.OPEN) ws.send(data);
      term.focus();
    }

    function measureCell() {
      const probe = document.createElement('span');
      probe.textContent = 'W';
      probe.style.cssText = 'position:absolute;visibility:hidden;font:14px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;line-height:1.15;';
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      probe.remove();
      return { width: rect.width || 8.4, height: rect.height || 16.1 };
    }

    const cell = measureCell();
    let lastCols = 0;
    let lastRows = 0;
    function resize() {
      const rect = container.getBoundingClientRect();
      const cols = Math.max(20, Math.floor((rect.width - 16) / cell.width));
      const rows = Math.max(5, Math.floor((rect.height - 16) / cell.height));
      if (cols === lastCols && rows === lastRows) return;
      lastCols = cols;
      lastRows = rows;
      term.resize(cols, rows);
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    }

    ws.onopen = () => {
      resize();
      term.writeln('');
    };
    ws.onmessage = (e) => {
      if (typeof e.data === 'string') term.write(e.data);
    };
    ws.onclose = (e) => term.writeln('\r\n--- Session ended (' + e.code + ') ---');
    ws.onerror = () => term.writeln('\r\nWebSocket error');

    term.onData((data) => {
      send(data);
    });

    document.querySelectorAll('[data-send]').forEach((btn) => {
      btn.addEventListener('click', () => send(btn.dataset.send));
    });

    document.getElementById('paste').addEventListener('click', async () => {
      try {
        let text = '';
        if (navigator.clipboard && window.isSecureContext) {
          text = await navigator.clipboard.readText();
        } else {
          text = prompt('Paste text') || '';
        }
        if (text) send(text.replace(/\r\n/g, '\n'));
      } catch {
        const text = prompt('Paste text') || '';
        if (text) send(text.replace(/\r\n/g, '\n'));
      }
    });

    document.getElementById('copy').addEventListener('click', async () => {
      const selected = term.getSelection();
      if (!selected) return;
      try {
        await navigator.clipboard.writeText(selected);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = selected;
        ta.style.cssText = 'position:fixed;left:-9999px;top:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      term.focus();
    });

    window.addEventListener('resize', resize);
    new ResizeObserver(resize).observe(container);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) setTimeout(resize, 50); });
  </script>
</body>
</html>
