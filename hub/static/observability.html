<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nest — Observability</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
  body{margin:0;background:#f5f5f5;color:#1a1a2e;font:14px/1.45 system-ui,sans-serif}
  .top{background:#1a1a2e;color:#fff;padding:12px 16px}
  .nav a{color:#8b8fa3;text-decoration:none;margin-right:12px;font-weight:700;font-size:12px}
  .nav a.active{color:#fff}
  .page{max-width:1040px;margin:0 auto;padding:16px}
  h1{margin:8px 0 12px 0}
  h2.section-h{margin:24px 0 8px 0;font-size:13px;text-transform:uppercase;color:#6b7280;letter-spacing:0.5px}
  .controls{display:flex;gap:8px;align-items:center;margin-bottom:16px;font-size:13px}
  .controls select,.controls button{font:inherit;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer}
  .controls button{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
  .meta{color:#6b7280;font-size:12px;margin-left:auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
  .card .k{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;font-weight:700}
  .card .v{font-size:28px;font-weight:700;margin-top:6px}
  .card .sub{font-size:12px;color:#6b7280;margin-top:2px}
  .waste-low,.frac-high{color:#15803d}
  .waste-mid,.frac-mid{color:#b45309}
  .waste-high,.frac-low{color:#b91c1c}
  .section{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:12px}
  .section h2{margin:0 0 10px 0;font-size:14px;text-transform:uppercase;color:#6b7280;letter-spacing:0.5px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top}
  th{color:#6b7280;font-weight:700;font-size:11px;text-transform:uppercase}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;color:#fff}
  .bar{display:flex;align-items:center;gap:6px}
  .bar-fill{height:6px;background:#e5e7eb;border-radius:3px;flex:1;overflow:hidden}
  .bar-fill > span{display:block;height:100%;background:#1a1a2e}
  .placeholder{color:#9ca3af;font-style:italic}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
  .chart-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
  .chart-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .chart-head .title{font-weight:700}
  .chart-head .now{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
  .chart-card .sub{font-size:12px;color:#6b7280;margin:2px 0 8px 0}
  .chart-card canvas{width:100%;height:120px;display:block}
  .legend{font-size:11px;color:#6b7280;margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .err{color:#b91c1c;padding:12px;background:#fee;border:1px solid #fcc;border-radius:6px}
  .warn{font-size:12px;color:#b45309;margin-top:4px}
  .pill{display:inline-block;padding:1px 6px;border-radius:10px;font-size:11px;background:#e5e7eb;color:#374151}
</style>
<script src="/sidebar.js"></script>
</head>
<body>
<div class="page">
  <h1>Observability</h1>

  <h2 class="section-h">Token capacity over time</h2>
  <div class="controls">
    <label>Window:</label>
    <select id="histWindow">
      <option value="5">Last 5h (live)</option>
      <option value="24" selected>Last 24h</option>
      <option value="168">Last 7d</option>
    </select>
    <button id="histRefresh">Refresh</button>
    <span class="meta" id="histMeta"></span>
  </div>
  <div id="charts">Loading…</div>

  <h2 class="section-h">Token ledger</h2>
  <div id="ledger">Loading…</div>

  <h2 class="section-h">Hub requests</h2>
  <div class="controls">
    <label>Window:</label>
    <select id="window">
      <option value="60">Last hour</option>
      <option value="360">Last 6h</option>
      <option value="1440" selected>Last 24h</option>
      <option value="10080">Last 7d</option>
    </select>
    <button id="refresh">Refresh</button>
    <span class="meta" id="meta"></span>
  </div>
  <div id="requests">Loading…</div>
</div>
<script>
const t = localStorage.getItem("nest_token");
if (!t) location.href = "/login";

const esc = s => String(s ?? "").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const METHOD_COLORS = {GET:"#22c55e",POST:"#3b82f6",PUT:"#f59e0b",PATCH:"#f59e0b",DELETE:"#ef4444",HEAD:"#6366f1"};

function wasteClass(pct) {
  if (pct < 5) return "waste-low";
  if (pct < 15) return "waste-mid";
  return "waste-high";
}
function fracClass(frac) {
  if (frac == null) return "";
  if (frac >= 0.5) return "frac-high";
  if (frac >= 0.2) return "frac-mid";
  return "frac-low";
}
function fmtTs(iso) { try { return new Date(iso).toLocaleString(); } catch { return iso; } }
function fmtNum(n) { return (n ?? 0).toLocaleString(); }

function renderLedger(d) {
  const sources = d.sources || [];
  if (sources.length === 0) {
    return `<div class="placeholder">No sources reporting yet.</div>`;
  }

  const sourceRows = sources.map(s => {
    const used = s.used?.amount ?? 0;
    const cap = s.cap?.amount;
    const remPct = s.remaining?.percent;
    const rem = s.remaining?.amount;
    const unknown = s.remaining?.unknown !== false;
    const remCell = unknown
      ? `<span class="placeholder">unknown</span>`
      : `${fmtNum(rem)} <span class="pill">${remPct?.toFixed(1)}%</span>`;
    const capCell = (cap == null) ? `<span class="placeholder">no cap</span>` : `${fmtNum(cap)} ${esc(s.cap?.unit || "")}`;
    const periodCell = s.period?.start
      ? `${esc(s.period.start.slice(0,10))} → ${esc(s.period.end.slice(0,10))}`
      : `<span class="placeholder">n/a</span>`;
    const warnings = (s.warnings || []).map(w => `<div class="warn">⚠ ${esc(w)}</div>`).join("");
    let metricsExtra = "";
    if (s.metrics) {
      const bits = [];
      if (s.metrics.errors != null && s.metrics.wastePct != null) {
        bits.push(`${fmtNum(s.metrics.errors)} errors · waste ${Number(s.metrics.wastePct).toFixed(1)}%`);
      }
      if (s.metrics.monthlyTokens != null) bits.push(`${fmtNum(s.metrics.monthlyTokens)} monthly tokens`);
      if (s.metrics.periodTokens != null) bits.push(`${fmtNum(s.metrics.periodTokens)} monthly tokens`);
      if (s.metrics.tokens5h != null) bits.push(`${fmtNum(s.metrics.tokens5h)} tokens / 5h`);
      if (s.metrics.calls5h != null) bits.push(`${fmtNum(s.metrics.calls5h)} calls / 5h`);
      if (s.metrics.periodCostUsdEquivalent != null) bits.push(`$${Number(s.metrics.periodCostUsdEquivalent).toFixed(2)} API-rate equivalent`);
      if (s.metrics.openrouterTotalCredits != null) bits.push(`${fmtNum(s.metrics.openrouterTotalCredits)} OpenRouter credits purchased`);
      if (s.metrics.openrouterTotalUsageUsd != null) bits.push(`$${Number(s.metrics.openrouterTotalUsageUsd).toFixed(2)} OpenRouter paid usage`);
      if (s.metrics.plan) bits.push(`plan: ${esc(s.metrics.plan)}`);
      if (s.metrics.capSource) bits.push(`cap: ${esc(s.metrics.capSource)}`);
      metricsExtra = bits.length ? `<div class="warn" style="color:#374151">${bits.join(" · ")}</div>` : "";
    }
    return `<tr>
      <td><strong>${esc(s.label)}</strong> <span class="pill">${esc(s.kind)}</span>${warnings}${metricsExtra}</td>
      <td class="num">${fmtNum(used)}</td>
      <td class="num">${capCell}</td>
      <td class="num">${remCell}</td>
      <td>${periodCell}</td>
    </tr>`;
  }).join("");

  return `
    <div class="section">
      <table>
        <thead><tr>
          <th>Source</th>
          <th class="num">Used</th>
          <th class="num">Cap</th>
          <th class="num">Remaining</th>
          <th>Period</th>
        </tr></thead>
        <tbody>${sourceRows}</tbody>
      </table>
    </div>
  `;
}

function renderRequests(d) {
  const w = d.hub?.waste || {};
  const r = d.hub?.requests || {};
  const pct = w.wastePct || 0;
  const cls = wasteClass(pct);
  const lat = r.latencyMs || {};

  const cards = `
    <div class="cards">
      <div class="card"><div class="k">Total requests</div><div class="v">${r.total || 0}</div><div class="sub">window: ${d.windowMinutes} min</div></div>
      <div class="card"><div class="k">Waste</div><div class="v ${cls}">${pct.toFixed(1)}%</div><div class="sub">errors + dupes / total</div></div>
      <div class="card"><div class="k">Errors (4xx/5xx)</div><div class="v">${w.errorRequests || 0}</div><div class="sub">of ${w.totalRequests || 0}</div></div>
      <div class="card"><div class="k">Duplicates &lt;2s</div><div class="v">${w.duplicateRequests || 0}</div><div class="sub">likely retries</div></div>
      <div class="card"><div class="k">p95 latency</div><div class="v">${lat.p95 || 0}<span style="font-size:14px;color:#6b7280"> ms</span></div><div class="sub">p50: ${lat.p50 || 0} · max: ${lat.max || 0}</div></div>
    </div>`;

  const byStatus = Object.entries(r.byStatus || {}).sort().map(([k,v]) =>
    `<tr><td>${esc(k)}</td><td class="num">${v}</td></tr>`).join("") || '<tr><td colspan="2" class="placeholder">No data</td></tr>';
  const byMethod = Object.entries(r.byMethod || {}).sort().map(([k,v]) =>
    `<tr><td><span class="badge" style="background:${METHOD_COLORS[k] || "#6b7280"}">${esc(k)}</span></td><td class="num">${v}</td></tr>`).join("") || '<tr><td colspan="2" class="placeholder">No data</td></tr>';

  const topMax = Math.max(1, ...(r.topPaths || []).map(p => p.count));
  const topPaths = (r.topPaths || []).map(p => `
    <tr>
      <td class="mono">${esc(p.path)}</td>
      <td class="num">${p.count}</td>
      <td><div class="bar"><div class="bar-fill"><span style="width:${(p.count/topMax*100).toFixed(0)}%"></span></div></div></td>
    </tr>`).join("") || '<tr><td colspan="3" class="placeholder">No data</td></tr>';

  return `
    ${cards}
    <div class="section">
      <h2>Top paths</h2>
      <table><thead><tr><th>Path</th><th class="num">Hits</th><th style="width:30%"></th></tr></thead><tbody>${topPaths}</tbody></table>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="section"><h2>By status</h2><table><tbody>${byStatus}</tbody></table></div>
      <div class="section"><h2>By method</h2><table><tbody>${byMethod}</tbody></table></div>
    </div>
  `;
}

// ── Token capacity charts (Task-Manager-style area graphs) ───────────────────
const SERIES_COLORS = ["#2563eb", "#16a34a", "#9333ea", "#ea580c", "#0891b2"];
const NBARS = 48;   // fixed bar count so usage bars stay readable at any window width

function fmtCompact(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(n >= 1e7 ? 0 : 1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(n >= 1e4 ? 0 : 1) + "k";
  return String(Math.round(n));
}

function unitShort(u) {
  return u === "tokens" ? "tok" : u === "requests" ? "req" : u === "capacity" ? "%" : "";
}

function unitLabel(u) {
  return u === "tokens" ? "tokens" : u === "requests" ? "requests" : u === "capacity" ? "window %" : u;
}

/**
 * Bucket per-slot usage into NBARS columns over the window [tMin, tMax] (both epoch sec).
 * `tMax` is the chart's right edge (next reset when on-axis, else now); `tMin` is the left edge.
 * The signal is chosen by the source's backend-declared usageUnit:
 *  - "tokens"/"requests" → deltas of the cumulative counter `u` (a trustworthy absolute count)
 *  - "capacity" (default) → drops in the real remaining% `r` (accurate when no reliable
 *    token counter exists, e.g. Codex, whose exec-mode token logs undercount)
 * Returns { buckets, peak, unit }.
 */
function usageBuckets(samples, id, usageUnit, tMin, tMax) {
  const useCounter = usageUnit === "tokens" || usageUnit === "requests";
  const pts = (samples || [])
    .map(e => ({ t: e.t, c: useCounter ? (e.u ? e.u[id] : null) : (e.r ? e.r[id] : null) }))
    .filter(p => p.c != null && p.t >= tMin && p.t <= tMax);
  const buckets = new Array(NBARS).fill(0);
  for (let i = 1; i < pts.length; i++) {
    const d = useCounter ? (pts[i].c - pts[i - 1].c) : (pts[i - 1].c - pts[i].c);   // counter rises / remaining% falls
    if (d <= 0) continue;
    const frac = (pts[i].t - tMin) / (tMax - tMin);
    if (frac < 0 || frac > 1) continue;
    buckets[Math.min(NBARS - 1, Math.floor(frac * NBARS))] += d;
  }
  return { buckets, peak: Math.max(0, ...buckets), unit: useCounter ? usageUnit : "capacity" };
}

// Max plausible horizon (hours) for a "resets in" countdown, by cadence. Guards against
// sources whose period.end is a monthly boundary rather than the rolling window (e.g. codex).
function cadenceHorizon(cadence) {
  if (/5h/.test(cadence || "")) return 6;
  if (/daily/.test(cadence || "")) return 26;
  if (/week/.test(cadence || "")) return 24 * 8;
  return Infinity;
}

// Length (hours) of a fixed rolling quota window, or null if the source has no such window.
function cadenceSpanHours(cadence) {
  if (/5h/.test(cadence || "")) return 5;
  if (/daily/.test(cadence || "")) return 24;
  if (/week/.test(cadence || "")) return 24 * 7;
  return null;
}

/**
 * Chart x-domain for a source: { tMax (right-edge epoch sec), hours (span) }.
 * When the source has a fixed rolling window (5h/daily/weekly) with a plausible next reset,
 * the chart spans exactly that window — left edge = window open, right edge = next reset — so
 * the series fills left→right toward the reset and the empty gap past "now" previews the
 * countdown. Early in a window (little data yet) it fills from the left instead of bunching at
 * the right edge. Otherwise it falls back to [now-fallbackHours, now] (the selected history
 * window ending at now), e.g. for Codex, whose reported period.end is a monthly boundary.
 * @param {?string} nextResetAt ISO time of the next reset
 * @param {?string} cadence reset cadence label (5h/daily/weekly)
 * @param {number} fallbackHours span to use when there is no on-axis rolling window
 * @returns {{ tMax: number, hours: number }}
 */
function chartDomain(nextResetAt, cadence, fallbackHours) {
  const nowSec = Date.now() / 1000;
  const span = cadenceSpanHours(cadence);
  if (span && nextResetAt) {
    const endSec = new Date(nextResetAt).getTime() / 1000;
    // Guard against a period.end that is really a monthly boundary, not the rolling window.
    if (isFinite(endSec) && endSec > nowSec && (endSec - nowSec) / 3600 <= cadenceHorizon(cadence)) {
      return { tMax: endSec, hours: span };
    }
  }
  return { tMax: nowSec, hours: fallbackHours };
}

/**
 * Left edge (epoch sec) for a chart. The window floor is `tMax - hours`, but we clamp it up to
 * the first available sample so data sits flush against the left edge rather than leaving an
 * empty leading gap from before the recorder existed (the recorder is younger than a 24h/weekly
 * window). Once a full window of history accumulates, firstSampleT <= floor and the floor wins,
 * so the chart settles to exactly one window. For unanchored sources (tMax = now) this fills the
 * plot edge-to-edge with whatever history exists.
 * @param {number} tMax right edge (epoch sec)
 * @param {number} hours window span
 * @param {?number} firstSampleT earliest in-window sample time (epoch sec), or null
 * @returns {number}
 */
function windowStart(tMax, hours, firstSampleT) {
  const floor = tMax - hours * 3600;
  return firstSampleT != null ? Math.max(floor, firstSampleT) : floor;
}

function fmtCountdown(iso, cadence) {
  if (!iso) return null;
  const secs = (new Date(iso).getTime() - Date.now()) / 1000;
  if (!isFinite(secs) || secs <= 0) return null;
  if (secs / 3600 > cadenceHorizon(cadence)) return null;   // period.end isn't the window reset
  const h = Math.floor(secs / 3600), m = Math.round((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

/**
 * Draw a filled area chart of remaining% over time onto a canvas, with auto-scaled
 * per-slot usage bars behind the line.
 * primary = [{t,v}] (5h/daily window), weekly = [{t,v}] thin overlay (optional),
 * bars = NBARS-length array of per-slot usage (auto-scaled to its own max).
 * Time domain is [tMin, tMax] (both epoch sec); `tMax` is the next reset when on-axis, else now.
 * When the right edge is a future reset, a dashed "now" marker splits past data from the gap-to-reset.
 */
function drawChart(canvas, primary, weekly, bars, barUnit, color, tMin, tMax) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const maxBar = Math.max(0, ...(bars || []));
  const padL = 30, padR = maxBar > 0 ? 48 : 8, padT = 8, padB = 16;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  // Keep only samples inside the window so older fetched points don't pile up at the left edge.
  primary = (primary || []).filter(p => p.t >= tMin && p.t <= tMax);
  weekly = (weekly || []).filter(p => p.t >= tMin && p.t <= tMax);
  const xOf = t => padL + Math.max(0, Math.min(1, (t - tMin) / (tMax - tMin))) * plotW;
  const yOf = v => padT + (1 - Math.max(0, Math.min(100, v)) / 100) * plotH;

  // Gridlines + Y labels at 0/25/50/75/100%.
  ctx.font = "10px system-ui,sans-serif";
  ctx.textBaseline = "middle";
  for (const g of [0, 25, 50, 75, 100]) {
    const y = yOf(g);
    ctx.strokeStyle = "#eceef1"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = "#9ca3af"; ctx.textAlign = "right";
    ctx.fillText(g + "%", padL - 4, y);
  }

  if (!primary.length) {
    ctx.fillStyle = "#9ca3af"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("collecting data…", padL + plotW / 2, padT + plotH / 2);
    return;
  }

  // Auto-scaled per-slot usage bars (behind the line). Tallest bar = window peak = full height.
  // A right axis labels the bar scale in absolute units (tokens/requests), so any bar's height
  // reads as a count. Rescales whenever a bigger slot appears — older bars shrink to match.
  if (maxBar > 0) {
    const bw = plotW / NBARS;
    ctx.fillStyle = color + "3a";
    for (let i = 0; i < NBARS; i++) {
      if (bars[i] <= 0) continue;
      const h = (bars[i] / maxBar) * plotH;
      ctx.fillRect(padL + i * bw + bw * 0.12, yOf(0) - h, bw * 0.76, h);
    }
    const us = unitShort(barUnit);
    ctx.fillStyle = "#9ca3af"; ctx.textAlign = "left";
    for (const f of [1, 0.5]) {
      ctx.fillText(fmtCompact(maxBar * f) + (f === 1 && us ? " " + us : ""), W - padR + 3, padT + (1 - f) * plotH);
    }
    ctx.fillText("0", W - padR + 3, yOf(0));
  }

  // Filled area for the primary remaining% series (faint, so bars stay legible).
  ctx.beginPath();
  ctx.moveTo(xOf(primary[0].t), yOf(primary[0].v));
  for (const p of primary) ctx.lineTo(xOf(p.t), yOf(p.v));
  const last = primary[primary.length - 1];
  ctx.lineTo(xOf(last.t), yOf(0)); ctx.lineTo(xOf(primary[0].t), yOf(0)); ctx.closePath();
  ctx.fillStyle = color + "14"; ctx.fill();

  ctx.beginPath();
  ctx.moveTo(xOf(primary[0].t), yOf(primary[0].v));
  for (const p of primary) ctx.lineTo(xOf(p.t), yOf(p.v));
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();

  // Weekly remaining% as a thin dashed overlay.
  if (weekly && weekly.length) {
    ctx.beginPath();
    ctx.moveTo(xOf(weekly[0].t), yOf(weekly[0].v));
    for (const p of weekly) ctx.lineTo(xOf(p.t), yOf(p.v));
    ctx.strokeStyle = "#6b7280"; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.stroke(); ctx.setLineDash([]);
  }

  // "now" marker: when the right edge is a future reset, everything to its right is the
  // gap until capacity refills. Drawing it lets you read how close the window is.
  const nowSec = Date.now() / 1000;
  if (tMax - nowSec > 60) {
    const xn = xOf(nowSec);
    ctx.strokeStyle = "#b6b9c0"; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(xn, padT); ctx.lineTo(xn, yOf(0)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = "#9ca3af"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
    ctx.fillText("now", xn, H);
  }
}

function renderCharts(d) {
  const sources = d.sources || [];
  if (!sources.length) return `<div class="placeholder">No capped sources reporting yet.</div>`;
  const html = sources.map((s, i) => {
    const color = SERIES_COLORS[i % SERIES_COLORS.length];
    const series = (d.samples || []).filter(e => e.r && e.r[s.id] != null).map(e => ({ t: e.t, v: e.r[s.id] }));
    const hasWeekly = (d.samples || []).some(e => e.w && e.w[s.id] != null);
    const now = series.length ? series[series.length - 1].v : null;
    const nowCls = now == null ? "" : fracClass(now / 100);
    const reset = fmtCountdown(s.nextResetAt, s.resetCadence);
    const sub = [s.resetCadence, reset ? `resets in ${reset}` : null].filter(Boolean).join(" · ");
    const dom = chartDomain(s.nextResetAt, s.resetCadence, d.hours);
    const tMin = windowStart(dom.tMax, dom.hours, series[0]?.t);
    const bars = usageBuckets(d.samples, s.id, s.usageUnit, tMin, dom.tMax);
    const barLegend = bars.peak > 0
      ? `<span><i style="background:${color}66"></i>${esc(unitLabel(bars.unit))} used/slot</span>`
      : "";
    const legend = `<div class="legend"><span><i style="background:${color}"></i>5h/daily remaining</span>${hasWeekly ? `<span><i style="background:#6b7280"></i>weekly remaining</span>` : ""}${barLegend}</div>`;
    return `<div class="chart-card" data-id="${esc(s.id)}" data-color="${color}" data-weekly="${hasWeekly}">
      <div class="chart-head"><span class="title">${esc(s.label)}</span><span class="now ${nowCls}">${now == null ? "–" : now + "%"}</span></div>
      <div class="sub">${esc(sub || "remaining capacity")}</div>
      <canvas></canvas>${legend}
    </div>`;
  }).join("");
  return `<div class="charts">${html}</div>`;
}

async function loadCharts() {
  const hours = parseInt(document.getElementById("histWindow").value, 10);
  document.getElementById("charts").innerHTML = "Loading…";
  try {
    const r = await fetch(`/api/observability/tokens/history?hours=${hours}`, { headers: { Authorization: "Bearer " + t } });
    if (r.status === 401) { localStorage.removeItem("nest_token"); location.href = "/login"; return; }
    if (!r.ok) throw new Error(`history HTTP ${r.status}: ${await r.text()}`);
    const d = await r.json();
    document.getElementById("charts").innerHTML = renderCharts(d);
    document.getElementById("histMeta").textContent = d.lastRecordedAt
      ? `Last sample ${fmtTs(d.lastRecordedAt)} · every ${Math.round(d.sampleIntervalSec / 60)} min`
      : "No samples recorded yet — the recorder samples every 5 min.";
    // Draw each card's canvas from its stashed series.
    const metaById = Object.fromEntries((d.sources || []).map(s => [s.id, s]));
    document.querySelectorAll("#charts .chart-card").forEach((card, i) => {
      const id = card.dataset.id, color = card.dataset.color, meta = metaById[id] || {};
      const dom = chartDomain(meta.nextResetAt, meta.resetCadence, hours);
      const primary = (d.samples || []).filter(e => e.r && e.r[id] != null).map(e => ({ t: e.t, v: e.r[id] }));
      const weekly = card.dataset.weekly === "true"
        ? (d.samples || []).filter(e => e.w && e.w[id] != null).map(e => ({ t: e.t, v: e.w[id] }))
        : [];
      const tMin = windowStart(dom.tMax, dom.hours, primary[0]?.t);
      const ub = usageBuckets(d.samples, id, meta.usageUnit, tMin, dom.tMax);
      drawChart(card.querySelector("canvas"), primary, weekly, ub.buckets, ub.unit, color, tMin, dom.tMax);
    });
  } catch (e) {
    document.getElementById("charts").innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

async function load() {
  const win = document.getElementById("window").value;
  document.getElementById("ledger").innerHTML = "Loading…";
  document.getElementById("requests").innerHTML = "Loading…";

  const headers = { Authorization: "Bearer " + t };

  try {
    const r1 = await fetch(`/api/observability/tokens`, { headers });
    if (r1.status === 401) { localStorage.removeItem("nest_token"); location.href = "/login"; return; }
    if (!r1.ok) throw new Error(`tokens HTTP ${r1.status}: ${await r1.text()}`);
    const d1 = await r1.json();
    document.getElementById("ledger").innerHTML = renderLedger(d1);
  } catch (e) {
    document.getElementById("ledger").innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }

  try {
    const r2 = await fetch(`/api/observability/requests?window=${win}`, { headers });
    if (!r2.ok) throw new Error(`requests HTTP ${r2.status}: ${await r2.text()}`);
    const d2 = await r2.json();
    document.getElementById("meta").textContent = `Generated ${fmtTs(d2.generatedAt)} · ${d2._source || ""}`;
    document.getElementById("requests").innerHTML = renderRequests(d2);
  } catch (e) {
    document.getElementById("requests").innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

document.getElementById("refresh").addEventListener("click", load);
document.getElementById("window").addEventListener("change", load);
document.getElementById("histRefresh").addEventListener("click", loadCharts);
document.getElementById("histWindow").addEventListener("change", loadCharts);
load();
loadCharts();
</script>
</body>
</html>
