<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Accept Invite</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#161a28;color:#161a28;font:16px/1.45 system-ui,sans-serif;padding:24px}.card{width:100%;max-width:440px;background:#fff;border-radius:18px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.35)}input,button{font:inherit}input{width:100%;padding:14px 16px;border:1px solid #d7dce5;border-radius:10px;margin-bottom:12px}.btn{width:100%;background:#1a1a2e;color:#fff;border:0;border-radius:10px;padding:12px 14px;font-weight:700;cursor:pointer}.status{margin-top:10px;min-height:20px;text-align:center;color:#b91c1c}</style></head><body><div class="card"><h1>Accept Invite</h1><p>Set a password for this user.</p><input id="password" type="password" placeholder="Password"><button class="btn" id="submit">Accept Invite</button><div class="status" id="status"></div></div><script>const token=new URLSearchParams(location.search).get("token");if(!token)document.getElementById("status").textContent="Missing invite token";document.getElementById("submit").onclick=async()=>{try{const r=await fetch("/api/auth/accept-invite",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:password.value})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||"Failed");localStorage.setItem("nest_token",d.token);location.href="/"}catch(e){document.getElementById("status").textContent=e.message||"Failed"}};</script></body></html>
