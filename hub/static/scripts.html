<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nest — Scripts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #1a1a2e; overflow: hidden; height: 100vh; }

/* Top bar */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #1a1a2e; color: #fff; }
.topbar h1 { font-size: 16px; font-weight: 600; }
.topbar-actions { display: flex; gap: 8px; }
.topbar-actions button { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.topbar-actions button:hover { background: rgba(255,255,255,0.2); }

/* Canvas plane — pannable, zoomable */
.canvas-wrap { flex: 1; overflow: hidden; position: relative; width: 100%; height: calc(100vh - 40px); }
.canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; min-width: 3000px; min-height: 3000px; }

/* Boxes */
.box { position: absolute; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); min-width: 60px; }
.box-container { padding: 6px; }
.box-leaf { background: #fff; border-radius: 6px; padding: 8px; border: 1px solid #e5e7eb; cursor: grab; }
.box-leaf:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.box-leaf.accent-green { border-left: 3px solid #22c55e; }
.box-leaf.accent-purple { border-left: 3px solid #8b5cf6; }
.box-leaf.accent-red { border-left: 3px solid #ef4444; }

/* Depth colors */
.depth-0 { background: #ece8e1; }
.depth-1 { background: #e2ddd4; }
.depth-2 { background: #d6d0c6; }
.depth-3 { background: #cbc4b8; }

/* Box header */
.box-header { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; cursor: grab; user-select: none; padding: 2px 4px; border-radius: 4px; }
.box-header:hover { background: rgba(0,0,0,0.04); }
.box-chevron { font-size: 10px; color: #888; width: 12px; flex-shrink: 0; }
.box-label { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 0.6px; flex: 1; }
.box-label-input { font-size: 11px; font-weight: 700; color: #333; letter-spacing: 0.6px; border: none; border-bottom: 1px solid #8b5cf6; background: transparent; outline: none; padding: 0 2px; min-width: 50px; }
.box-count { font-size: 9px; color: #999; }
.box-actions { display: flex; gap: 2px; }
.box-actions button { width: 20px; height: 20px; border: none; background: transparent; color: #888; font-size: 14px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.box-actions button:hover { background: rgba(0,0,0,0.06); }

/* Children container */
.box-children { display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; position: relative; }
.box-children.collapsed { display: none; }

/* Drop target */
.drop-target { border: 2px dashed #22c55e !important; background: rgba(34,197,94,0.05) !important; }

/* Empty hint */
.empty-hint { border: 1px dashed #ccc; border-radius: 6px; padding: 12px; text-align: center; color: #bbb; font-size: 10px; min-width: 100px; }

/* Script content */
.script-name { font-size: 12px; font-weight: 600; color: #1a1a2e; display: flex; align-items: center; gap: 4px; }
.script-name.lib { color: #8b5cf6; }
.script-desc { font-size: 10px; color: #666; margin-top: 3px; line-height: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.script-meta { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
.line-label { font-size: 9px; color: #999; font-weight: 500; min-width: 28px; }
.line-bar { flex: 1; height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
.line-bar-fill { height: 100%; border-radius: 2px; }
.script-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.tag { padding: 1px 5px; border-radius: 3px; font-size: 8px; font-weight: 600; border: 1px solid; }
.script-sources { font-size: 9px; color: #8b5cf6; margin-top: 3px; }
.script-time { font-size: 8px; color: #bbb; margin-top: 3px; }
.run-btn { width: 20px; height: 20px; border-radius: 10px; background: #22c55e; border: none; color: #fff; font-size: 9px; cursor: pointer; margin-left: auto; flex-shrink: 0; }
.run-btn:hover { background: #16a34a; }

/* Viewer overlay */
.viewer { display: none; position: fixed; inset: 0; background: #f5f5f5; z-index: 100; flex-direction: column; }
.viewer.open { display: flex; }
.viewer-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e7eb; }
.viewer-header .back { cursor: pointer; font-size: 15px; font-weight: 500; color: #1a1a2e; }
.viewer-header .path { flex: 1; font-size: 14px; font-weight: 500; color: #1a1a2e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.viewer-header .run { padding: 6px 14px; background: #22c55e; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.viewer-body { flex: 1; background: #1a1a2e; padding: 16px; overflow: auto; }
.viewer-body pre { color: #d4d4d4; font-family: monospace; font-size: 12px; line-height: 18px; white-space: pre-wrap; }

/* Minimap */
.minimap { position: fixed; bottom: 12px; right: 12px; width: 160px; height: 100px; background: rgba(26,26,46,0.85); border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; z-index: 50; }
.minimap canvas { width: 100%; height: 100%; }

/* Zoom indicator */
.zoom-indicator { position: fixed; bottom: 12px; left: 12px; font-size: 10px; color: #999; font-family: monospace; z-index: 50; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Scripts</h1>
  <div class="topbar-actions">
    <button onclick="resetCanvas()">&#x21bb; Rescan</button>
    <button onclick="fitToView()">Fit</button>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <div class="canvas" id="canvas"></div>
</div>

<div class="viewer" id="viewer">
  <div class="viewer-header">
    <span class="back" onclick="closeViewer()">← Back</span>
    <span class="path" id="viewerPath"></span>
    <button class="run" id="viewerRun">Run</button>
  </div>
  <div class="viewer-body"><pre id="viewerCode"></pre></div>
</div>

<div class="zoom-indicator" id="zoomIndicator">100%</div>

<script>
const API = '/api';
const TOKEN = localStorage.getItem('nest_token');

let canvas = { boxes: {} };
let scripts = new Map();
let pan = { x: 0, y: 0 };
let zoom = 1;
let dragging = null; // { id, offsetX, offsetY }
let panning = false;
let panStart = { x: 0, y: 0 };
let dragReparent = null; // source box id being HTML5-dragged
let saveTimer = null;

// ── API ──

async function api(path, opts = {}) {
  const h = { 'Authorization': `Bearer ${TOKEN}` };
  if (opts.body) h['Content-Type'] = 'application/json';
  const res = await fetch(API + path, { ...opts, headers: h });
  if (res.status === 401) { location.href = '/login'; return; }
  if (!res.ok) { console.error('API error', res.status, path); return null; }
  return res.json();
}

async function loadData() {
  try {
    const [scriptData, canvasData] = await Promise.all([
      api('/scripts'),
      api('/canvas'),
    ]);
    scripts = new Map();
    for (const s of (scriptData?.scripts || [])) scripts.set(s.path, s);

    if (!canvasData?.boxes || Object.keys(canvasData.boxes).length === 0) {
      canvas = await api('/canvas/init', { method: 'POST' }) || { boxes: {} };
    } else {
      canvas = await api('/canvas/sync', { method: 'POST' }) || canvasData;
    }
    render();
    setTimeout(fitToView, 100);
  } catch(e) {
    console.error('loadData failed', e);
  }
}

function saveCanvas() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    api('/canvas', { method: 'PUT', body: JSON.stringify(canvas) });
  }, 400);
}

async function resetCanvas() {
  canvas = await api('/canvas/init', { method: 'POST' });
  render();
}

// ── Rendering ──

function render() {
  const el = document.getElementById('canvas');
  el.innerHTML = '';
  const root = canvas.boxes.root;
  if (!root?.children) return;
  for (const childId of root.children) {
    const box = canvas.boxes[childId];
    if (!box) continue;
    el.appendChild(renderBox(childId, box, 0));
  }
  updateTransform();
}

const renderStack = new Set();
function renderBox(id, box, depth) {
  if (renderStack.has(id) || depth > 10) {
    console.warn('Circular or deep nesting detected:', id, depth);
    const err = document.createElement('div');
    err.textContent = `[circular: ${id}]`;
    err.style.color = 'red';
    return err;
  }
  renderStack.add(id);
  const isLeaf = box.type === 'script';
  const script = isLeaf && box.ref ? scripts.get(box.ref) : null;
  const label = box.label || script?.name || id;

  let el;
  if (isLeaf && script) el = renderLeaf(id, box, script, depth);
  else el = renderContainer(id, box, label, depth);
  renderStack.delete(id);
  return el;
}

function renderContainer(id, box, label, depth) {
  const div = document.createElement('div');
  div.className = `box box-container depth-${Math.min(depth, 3)}`;
  div.dataset.boxId = id;

  // Position (depth 0 = absolute on canvas)
  if (depth === 0 && box.x != null) {
    div.style.left = box.x + 'px';
    div.style.top = box.y + 'px';
  } else {
    div.style.position = 'relative';
  }

  // Header
  const header = document.createElement('div');
  header.className = 'box-header';
  header.innerHTML = `
    <span class="box-chevron">${box.collapsed ? '▸' : '▾'}</span>
    <span class="box-label" data-id="${id}">${label}</span>
    <span class="box-count">${(box.children?.length || 0)}</span>
    <div class="box-actions">
      <button onclick="event.stopPropagation(); createBox('${id}')">+</button>
      ${depth > 0 ? `<button onclick="event.stopPropagation(); deleteBox('${id}')" style="color:#999">×</button>` : ''}
    </div>
  `;

  // Collapse toggle
  header.querySelector('.box-chevron').onclick = (e) => {
    e.stopPropagation();
    box.collapsed = !box.collapsed;
    canvas.boxes[id] = box;
    saveCanvas();
    render();
  };

  // Rename on dblclick
  header.querySelector('.box-label').ondblclick = (e) => {
    e.stopPropagation();
    const span = e.target;
    const input = document.createElement('input');
    input.className = 'box-label-input';
    input.value = label;
    input.onblur = () => { renameBox(id, input.value); };
    input.onkeydown = (ev) => { if (ev.key === 'Enter') input.blur(); };
    span.replaceWith(input);
    input.focus();
    input.select();
  };

  // Drag to move (depth 0)
  if (depth === 0) {
    header.onmousedown = (e) => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      e.stopPropagation();
      dragging = { id, offsetX: e.clientX / zoom - (box.x || 0), offsetY: e.clientY / zoom - (box.y || 0) };
      header.style.cursor = 'grabbing';
    };
  }

  div.appendChild(header);

  // Children
  if (!box.collapsed) {
    const children = document.createElement('div');
    children.className = 'box-children';
    for (const childId of (box.children || [])) {
      const child = canvas.boxes[childId];
      if (!child) continue;
      children.appendChild(renderBox(childId, child, depth + 1));
    }
    if ((box.children || []).length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'drop here';
      children.appendChild(hint);
    }
    div.appendChild(children);
  }

  // HTML5 drag for reparenting
  div.draggable = true;
  div.ondragstart = (e) => {
    e.stopPropagation();
    e.dataTransfer.setData('text/plain', id);
    dragReparent = id;
    div.style.opacity = '0.5';
  };
  div.ondragend = () => { div.style.opacity = '1'; dragReparent = null; clearDropTargets(); };
  div.ondragover = (e) => {
    if (!dragReparent || dragReparent === id || !box.children) return;
    e.preventDefault(); e.stopPropagation();
    clearDropTargets();
    div.classList.add('drop-target');
  };
  div.ondragleave = () => div.classList.remove('drop-target');
  div.ondrop = (e) => {
    e.preventDefault(); e.stopPropagation();
    const srcId = e.dataTransfer.getData('text/plain');
    if (srcId && srcId !== id) reparentBox(srcId, id);
    clearDropTargets();
  };

  return div;
}

function renderLeaf(id, box, script, depth) {
  const isLib = script.target === 'local';
  const accent = script.dangerous ? 'red' : isLib ? 'purple' : 'green';
  const nameLen = (script.name || '').length;
  const w = Math.max(140, Math.min(nameLen * 8 + (script.description ? 80 : 40), 280));

  const div = document.createElement('div');
  div.className = `box box-leaf accent-${accent}`;
  div.style.width = w + 'px';
  div.style.position = 'relative';
  div.dataset.boxId = id;

  // Line bar
  const pct = Math.min((script.lines / 300) * 100, 100);
  const barColor = script.lines > 200 ? '#f59e0b' : script.lines > 50 ? '#3b82f6' : '#22c55e';

  // Tags
  let tags = '';
  if (script.target !== 'any') tags += tagHTML(script.target, script.target === 'local' ? '#8b5cf6' : '#f59e0b');
  if (script.dangerous) tags += tagHTML('dangerous', '#ef4444');
  if (script.author) tags += tagHTML(script.author, '#6366f1');
  if (script.hasArgs && script.args) tags += tagHTML(script.args, '#0891b2');

  div.innerHTML = `
    <div class="script-name ${isLib ? 'lib' : ''}">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${script.name}</span>
      ${!isLib ? `<button class="run-btn" title="Run">▶</button>` : ''}
    </div>
    ${script.description ? `<div class="script-desc">${esc(script.description)}</div>` : ''}
    <div class="script-meta">
      <span class="line-label">${script.lines}L</span>
      <div class="line-bar"><div class="line-bar-fill" style="width:${Math.max(pct,4)}%;background:${barColor}"></div></div>
    </div>
    ${tags ? `<div class="script-tags">${tags}</div>` : ''}
    ${script.sources.length ? `<div class="script-sources">sources ${esc(script.sources.join(', '))}</div>` : ''}
    <div class="script-time">${timeAgo(script.modified)}</div>
  `;

  // Click to view source
  div.onclick = (e) => {
    if (e.target.classList.contains('run-btn')) return;
    openViewer(script);
  };

  // Run button
  const runBtn = div.querySelector('.run-btn');
  if (runBtn) runBtn.onclick = (e) => { e.stopPropagation(); alert('Run ' + script.path + ' — server picker not yet in HTML5 view'); };

  // HTML5 drag for reparenting
  div.draggable = true;
  div.ondragstart = (e) => {
    e.stopPropagation();
    e.dataTransfer.setData('text/plain', id);
    dragReparent = id;
    div.style.opacity = '0.5';
  };
  div.ondragend = () => { div.style.opacity = '1'; dragReparent = null; clearDropTargets(); };

  return div;
}

function tagHTML(label, color) {
  return `<span class="tag" style="color:${color};background:${color}18;border-color:${color}40">${esc(label)}</span>`;
}

// ── Canvas mutations ──

function reparentBox(childId, newParentId) {
  // Remove from old parent
  for (const [key, box] of Object.entries(canvas.boxes)) {
    if (box.children?.includes(childId)) {
      box.children = box.children.filter(id => id !== childId);
    }
  }
  // Add to new parent
  const parent = canvas.boxes[newParentId];
  if (parent) {
    parent.children = [...(parent.children || []), childId];
  }
  saveCanvas();
  render();
}

function createBox(parentId) {
  const newId = 'box-' + Date.now();
  canvas.boxes[newId] = { label: 'New Group', children: [] };
  const parent = canvas.boxes[parentId];
  if (parent) parent.children = [...(parent.children || []), newId];
  saveCanvas();
  render();
}

function deleteBox(id) {
  const box = canvas.boxes[id];
  if (!box) return;
  const orphans = box.children || [];
  for (const [key, b] of Object.entries(canvas.boxes)) {
    if (b.children?.includes(id)) {
      b.children = b.children.flatMap(cid => cid === id ? orphans : [cid]);
    }
  }
  delete canvas.boxes[id];
  saveCanvas();
  render();
}

function renameBox(id, newLabel) {
  if (!newLabel.trim()) { render(); return; }
  canvas.boxes[id] = { ...canvas.boxes[id], label: newLabel.trim() };
  saveCanvas();
  render();
}

function clearDropTargets() {
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
}

// ── Viewer ──

async function openViewer(script) {
  const data = await api(`/scripts/view/${script.path}${script.repo ? '?repo=' + script.repo : ''}`);
  document.getElementById('viewerPath').textContent = script.path;
  document.getElementById('viewerCode').textContent = data.content;
  document.getElementById('viewer').classList.add('open');
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
}

// ── Pan & Zoom ──

function updateTransform() {
  const c = document.getElementById('canvas');
  c.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  document.getElementById('zoomIndicator').textContent = Math.round(zoom * 100) + '%';
}

document.getElementById('canvasWrap').addEventListener('mousedown', (e) => {
  if (e.target === document.getElementById('canvasWrap') || e.target === document.getElementById('canvas')) {
    panning = true;
    panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    document.getElementById('canvasWrap').style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', (e) => {
  if (dragging) {
    const box = canvas.boxes[dragging.id];
    if (box) {
      box.x = e.clientX / zoom - dragging.offsetX;
      box.y = (e.clientY - 40) / zoom - dragging.offsetY; // 40 = topbar height
      const el = document.querySelector(`[data-box-id="${dragging.id}"]`);
      if (el) { el.style.left = box.x + 'px'; el.style.top = box.y + 'px'; }
    }
  }
  if (panning) {
    pan.x = e.clientX - panStart.x;
    pan.y = e.clientY - panStart.y;
    updateTransform();
  }
});

window.addEventListener('mouseup', () => {
  if (dragging) {
    saveCanvas();
    dragging = null;
  }
  if (panning) {
    panning = false;
    document.getElementById('canvasWrap').style.cursor = '';
  }
});

document.getElementById('canvasWrap').addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.2, Math.min(3, zoom * delta));
  // Zoom toward cursor
  const rect = document.getElementById('canvasWrap').getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  pan.x = mx - (mx - pan.x) * (newZoom / zoom);
  pan.y = my - (my - pan.y) * (newZoom / zoom);
  zoom = newZoom;
  updateTransform();
}, { passive: false });

function fitToView() {
  // Find bounding rect of all depth-0 boxes
  const root = canvas.boxes.root;
  if (!root?.children?.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const id of root.children) {
    const box = canvas.boxes[id];
    if (!box) continue;
    const x = box.x || 0, y = box.y || 0;
    const el = document.querySelector(`[data-box-id="${id}"]`);
    const w = el?.offsetWidth || 400, h = el?.offsetHeight || 300;
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
  }
  const wrap = document.getElementById('canvasWrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const cw = maxX - minX + 40, ch = maxY - minY + 40;
  zoom = Math.min(ww / cw, wh / ch, 1.5);
  pan.x = (ww - cw * zoom) / 2 - minX * zoom;
  pan.y = (wh - ch * zoom) / 2 - minY * zoom;
  updateTransform();
}

// ── Helpers ──

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Init ──
loadData();
</script>
</body>
</html>
