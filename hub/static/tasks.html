<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Sessions</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#1a1a2e;color:#fff;font:14px/1.45 system-ui,sans-serif}.top{padding:12px 16px;background:#16162a;border-bottom:1px solid #2a2a4a}.top a{color:#7eb8ff;text-decoration:none;font-weight:700}.page{max-width:960px;margin:0 auto;padding:16px}.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}.btn{border:0;border-radius:8px;padding:12px 14px;background:#2a2a4a;color:#7eb8ff;font:inherit;font-weight:700;cursor:pointer}.card{background:#22223a;border:1px solid #2a2a4a;border-radius:10px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;gap:12px;align-items:center}.mono{font-family:ui-monospace,monospace}.muted{color:#999;font-size:12px}</style></head><body><div class="top"><a href="/commands">Back</a></div><div class="page"><h1>Sessions</h1><div class="row"><button class="btn" id="newTerm">&gt;_ New Terminal</button><button class="btn" id="newClaude">C/ New Claude Code</button><button class="btn" id="refresh">Refresh</button></div><div id="app">Loading…</div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const app=document.getElementById("app");const esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));async function api(p,o={}){const h={...(o.headers||{}),Authorization:"Bearer "+t};if(o.body)h["Content-Type"]="application/json";const r=await fetch("/api"+p,{...o,headers:h});if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";throw new Error("Unauthorized")}const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||("API error "+r.status));return d}async function load(){try{const d=await api("/sessions");app.innerHTML=(d.sessions||[]).map(s=>'<div class="card"><div><div class="mono">'+esc(s.name)+'</div><div class="muted">'+esc(s.created)+(s.attached?' · attached':'')+'</div></div><div><a class="btn" href="/terminal?session='+encodeURIComponent(s.name)+'">Open</a> <button class="btn" data-kill="'+esc(s.name)+'">Kill</button></div></div>').join("")||'<div class="muted">No active sessions</div>';document.querySelectorAll("[data-kill]").forEach(b=>b.onclick=async()=>{if(confirm("Kill session "+b.dataset.kill+"?")){await api("/sessions/"+encodeURIComponent(b.dataset.kill),{method:"DELETE"});load();}})}catch(e){app.textContent=e.message||"Failed"}}async function create(name,cmd){await api("/sessions",{method:"POST",body:JSON.stringify({name,cmd})});location.href='/terminal?session='+encodeURIComponent(name)}document.getElementById("newTerm").onclick=()=>create("term-"+Date.now(),"bash");document.getElementById("newClaude").onclick=()=>create("claude-"+Date.now(),"claude --dangerously-skip-permissions");document.getElementById("refresh").onclick=load;load();</script></body></html>
