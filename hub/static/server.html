v><div class="row"><span>IPv4</span><span>'+esc(d.server.ip)+'</span></div><div class="row"><span>Type</span><span>'+esc(d.server.type)+'</span></div><div class="row"><span>Location</span><span>'+esc(d.server.location)+'</span></div><div class="row"><span>Image</span><span>'+esc(d.server.image)+'</span></div>'+(d.metrics?'<div class="row"><span>CPU</span><span>'+Math.round(d.metrics.cpu.percent)+'%</span></div><div class="row"><span>RAM</span><span>'+Math.round(d.metrics.memory.percent)+'% · '+d.metrics.memory.used_mb+'MB / '+d.metrics.memory.total_mb+'MB</span></div><div class="row"><span>Disk</span><span>'+Math.round(d.metrics.disk.percent)+'% · '+d.metrics.disk.used_gb+'GB / '+d.metrics.disk.total_gb+'GB</span></div><div class="row"><span>Uptime</span><span>'+Math.floor(d.metrics.uptime_seconds/3600)+'h '+Math.floor((d.metrics.uptime_seconds%3600)/60)+'m</span></div>':'')+'</div><div class="card"><button class="btn" id="reboot">Reboot</button><button class="btn" id="shutdown">Shutdown</button><button class="btn" id="poweron">Power On</button><a class="btn" href="/terminal?session='+encodeURIComponent("server-"+id)+'">Terminal</a></div>';document.getElementById("reboot").onclick=()=>action("reboot");document.getElementById("shutdown").onclick=()=>action("shutdown");document.getElementById("poweron").onclick=()=>action("poweron")}catch(e){app.textContent=e.message||"Failed"}}load();</script></body></html>
