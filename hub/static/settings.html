<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Settings</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#f5f5f5;color:#1a1a2e;font:14px/1.45 system-ui,sans-serif}.top{background:#1a1a2e;color:#fff;padding:12px 16px}.nav a,.nav button{color:#8b8fa3;text-decoration:none;margin-right:12px;font-weight:700;font-size:12px;background:none;border:0;cursor:pointer}.nav a.active{color:#fff}.page{max-width:860px;margin:0 auto;padding:16px}.section{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px}.title{font-size:12px;color:#777;text-transform:uppercase;margin-bottom:8px}.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}.row:last-child{border-bottom:0}.btn{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;font:inherit}.dark{background:#1a1a2e;color:#fff}.green{background:#22c55e;color:#fff}.red{border:1px solid #ef4444;background:#fff;color:#ef4444}.input{width:100%;background:#f5f5f5;border:1px solid #e5e7eb;border-radius:8px;padding:10px;font:inherit;margin-bottom:8px}.mono{font-family:monospace;font-size:12px}</style></head><body><div class="top"><div class="nav"><a href="/">Servers</a><a href="/settings" class="active">Settings</a><a href="/roadmap">Roadmap</a><button id="logout">Logout</button></div></div><div class="page"><h1>Settings</h1><div class="section"><div class="title">Hub</div><div id="health">Loading…</div></div><div class="section"><div style="display:flex;justify-content:space-between;align-items:center"><div class="title">Users</div><button class="btn dark" id="toggleInvite">+ Invite</button></div><div id="invite" hidden><input id="inviteName" class="input" placeholder="Name"><input id="invitePassword" class="input" placeholder="Password"><button class="btn green" id="createUser">Create User</button></div><div id="users">Loading…</div></div><div class="section"><div style="display:flex;justify-content:space-between;align-items:center"><div class="title">API Tokens</div><button class="btn dark" id="toggleToken">+ Create</button></div><div id="tokenForm" hidden><input id="tokenName" class="input" placeholder="Token name"><button class="btn green" id="createToken">Create Token</button></div><div id="newToken"></div><div id="tokens">Loading…</div></div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));async function api(p,o={}){const h={...(o.headers||{}),Authorization:"Bearer "+t};if(o.body)h["Content-Type"]="application/json";const r=await fetch("/api"+p,{...o,headers:h});if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";throw new Error("Unauthorized")}const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||("API error "+r.status));return d}async function load(){api("/health").then(h=>document.getElementById("health").innerHTML='<div class="row"><span>Version</span><span>'+esc(h.version)+'</span></div><div class="row"><span>Uptime</span><span>'+Math.floor(h.uptime)+'s</span></div>').catch(()=>document.getElementById("health").textContent="Unavailable");api("/auth/users").then(d=>document.getElementById("users").innerHTML=(d.users||[]).map(u=>'<div class="row"><div><div>'+esc(u.name)+'</div><div style="color:#777;font-size:12px">'+esc(u.role)+' · '+esc(u.id)+'</div></div>'+(u.id!=="admin"?'<button class="btn red" data-user="'+esc(u.id)+'">Delete</button>':'')+'</div>').join("")||"No users").then(()=>document.querySelectorAll("[data-user]").forEach(b=>b.onclick=async()=>{if(confirm("Delete user?")){await api("/auth/users/"+encodeURIComponent(b.dataset.user),{method:"DELETE"});load();}}));api("/auth/tokens").then(d=>document.getElementById("tokens").innerHTML=(d.tokens||[]).map(x=>'<div class="row"><div><div>'+esc(x.name)+'</div><div class="mono">'+esc(x.id)+'</div></div><button class="btn red" data-token="'+esc(x.id)+'">Delete</button></div>').join("")||"No API tokens").then(()=>document.querySelectorAll("[data-token]").forEach(b=>b.onclick=async()=>{if(confirm("Delete token?")){await api("/auth/tokens/"+encodeURIComponent(b.dataset.token),{method:"DELETE"});load();}}));}document.getElementById("logout").onclick=()=>{localStorage.removeItem("nest_token");location.href="/login"};document.getElementById("toggleInvite").onclick=()=>document.getElementById("invite").hidden=!document.getElementById("invite").hidden;document.getElementById("toggleToken").onclick=()=>document.getElementById("tokenForm").hidden=!document.getElementById("tokenForm").hidden;document.getElementById("createUser").onclick=async()=>{await api("/auth/invite",{method:"POST",body:JSON.stringify({name:inviteName.value.trim(),password:invitePassword.value})});inviteName.value="";invitePassword.value="";document.getElementById("invite").hidden=true;load()};document.getElementById("createToken").onclick=async()=>{const d=await api("/auth/tokens",{method:"POST",body:JSON.stringify({name:tokenName.value.trim()})});document.getElementById("newToken").innerHTML='<div class="section" style="margin:12px 0 0;background:#f0fdf4;border-color:#22c55e"><div style="font-size:12px;color:#15803d;margin-bottom:6px">New token — copy it now</div><div class="mono" style="word-break:break-all">'+esc(d.token)+'</div></div>';tokenName.value="";document.getElementById("tokenForm").hidden=true;load()};load();</script></body></html>
