<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link rel="manifest" href="/manifest.webmanifest">
<title>Nest — Worlds</title>
<style>
  :root{color-scheme:dark;--bg:#07111f;--panel:rgba(12,22,38,.88);--panel2:#0d1b2f;--line:#22344f;--text:#e5edf8;--muted:#8fa3bd;--hot:#67e8f9;--good:#86efac;--warn:#fbbf24;--bad:#fb7185}
  *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 25% 0,#14233f 0,#07111f 42%,#030712 100%);color:var(--text);font:14px/1.42 system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font:inherit} button{touch-action:manipulation}
  .shell{display:grid;grid-template-columns:minmax(0,1fr) 340px;height:100vh;height:100dvh}
  .stage{position:relative;min-width:0;overflow:hidden;background:#050b15}
  .toolbar{position:absolute;z-index:5;top:10px;left:10px;right:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;pointer-events:none}.toolbar>*{pointer-events:auto}
  .brand{font-weight:800;letter-spacing:.2px;background:rgba(7,17,31,.82);border:1px solid var(--line);border-radius:999px;padding:7px 11px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
  .pill{border:1px solid var(--line);background:rgba(12,22,38,.86);color:var(--text);border-radius:999px;padding:7px 10px;font-size:12px}.pill strong{color:var(--hot)}
  .toolbar button,.toolbar select,.panel button,.chat button{background:rgba(12,22,38,.94);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:7px 10px;cursor:pointer}.toolbar button.active,.panel button.primary,.chat button.primary{background:#155e75;border-color:#22d3ee;color:white}.toolbar button:disabled{opacity:.45;cursor:not-allowed}
  #fallback,#map,#gl{position:absolute;inset:0;width:100%;height:100%;display:block}.hidden{display:none!important}
  #fallback{padding:72px 12px 170px;overflow:auto;background:linear-gradient(180deg,#0b1424,#07111f)}
  .fallback-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;max-width:920px}.fallback-card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}.fallback-card.selected{border-color:var(--hot);box-shadow:0 0 0 2px rgba(103,232,249,.12)}.fallback-card h3{margin:0 0 6px;font-size:15px}.fallback-card .meta{font-size:12px;color:var(--muted)}
  .viewports{position:absolute;z-index:4;left:10px;bottom:10px;display:flex;gap:8px;max-width:calc(100% - 360px);overflow:auto;padding-bottom:2px}.viewport{min-width:138px;background:rgba(3,7,18,.74);border:1px solid var(--line);border-radius:12px;padding:8px;backdrop-filter:blur(8px)}.viewport.active{border-color:var(--hot)}.viewport .mini{height:54px;border-radius:8px;background:linear-gradient(135deg,#0e7490,#1e293b);position:relative;overflow:hidden}.viewport .mini:before{content:"";position:absolute;left:48%;top:10%;width:8px;height:80%;background:rgba(255,255,255,.28);transform:rotate(24deg)}.viewport .name{font-size:12px;font-weight:700;margin-top:6px}.viewport .meta{font-size:11px;color:var(--muted)}
  .panel{background:var(--panel);border-left:1px solid var(--line);padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(10px)}.panel h1{font-size:18px;margin:0}.panel h2{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:4px 0 7px}.box{border:1px solid var(--line);background:rgba(13,27,47,.72);border-radius:14px;padding:11px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.stat{display:grid;grid-template-columns:1fr auto;gap:6px;font-size:12px;color:var(--muted);padding:3px 0}.stat strong{color:var(--text);font-variant-numeric:tabular-nums}.list{display:flex;flex-direction:column;gap:6px}.item{border:1px solid var(--line);background:rgba(7,17,31,.6);border-radius:10px;padding:8px;cursor:pointer}.item.selected{border-color:var(--hot);background:rgba(21,94,117,.28)}.item .top{display:flex;justify-content:space-between;gap:8px;font-weight:700}.item .sub{font-size:12px;color:var(--muted);margin-top:2px}.status-ok{color:var(--good)}.status-warn{color:var(--warn)}
  .chat{position:absolute;z-index:6;right:352px;bottom:10px;width:min(420px,calc(100vw - 374px));background:rgba(3,7,18,.82);border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.32);overflow:hidden;backdrop-filter:blur(12px)}.chat-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}.chat-log{max-height:170px;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:7px}.msg{border-radius:10px;padding:8px 9px;font-size:13px}.msg.user{background:#164e63;align-self:flex-end}.msg.nest{background:#111827;border:1px solid var(--line)}.chat-compose{display:flex;gap:7px;padding:9px;border-top:1px solid var(--line)}.chat input{flex:1;min-width:0;background:#07111f;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:8px}.context{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .small{font-size:12px;color:var(--muted)}.unlock{color:var(--good);font-weight:800}.warn{color:var(--warn)}.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}.chip{border:1px solid var(--line);background:rgba(103,232,249,.08);border-radius:999px;padding:2px 7px;font-size:11px;color:#c9f7ff}.kv{display:grid;grid-template-columns:82px 1fr;gap:4px;font-size:12px;color:var(--muted);padding:2px 0}.kv strong{color:var(--text);font-weight:650}.zone-swatch{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}
  .preset-strip{position:absolute;z-index:5;top:54px;left:10px;right:352px;display:flex;gap:7px;overflow:auto;padding-bottom:3px;pointer-events:none}.preset-chip{pointer-events:auto;white-space:nowrap;background:rgba(7,17,31,.78);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 10px;font-size:12px;cursor:pointer}.preset-chip.active{background:#155e75;border-color:#22d3ee}.preset-chip small{color:var(--muted);margin-left:4px}.preset-card{border:1px solid var(--line);background:rgba(7,17,31,.55);border-radius:10px;padding:8px;cursor:pointer}.preset-card.active{border-color:var(--hot);background:rgba(21,94,117,.25)}.preset-card .top{font-weight:800}.preset-card .sub{font-size:12px;color:var(--muted);margin-top:2px}
  @media (max-width:860px){body{overflow:auto}.shell{display:block;height:auto;min-height:100vh}.stage{height:62vh;min-height:380px}.panel{border-left:0;border-top:1px solid var(--line);min-height:38vh}.chat{position:fixed;left:8px;right:8px;bottom:8px;width:auto}.viewports{right:10px;max-width:calc(100% - 20px);bottom:156px}.toolbar{right:8px}.brand{width:100%}.preset-strip{right:10px;top:92px}}
  @media (max-width:520px){.toolbar{gap:5px}.toolbar button,.toolbar select,.pill{padding:6px 8px;font-size:11px}.stage{height:58vh;min-height:340px}.chat-log{max-height:114px}.viewports{display:none}.panel{padding-bottom:190px}}
</style>
<script src="/sidebar.js"></script>
</head>
<body>
<div class="shell">
  <main class="stage" id="stage">
    <canvas id="gl" class="hidden" aria-label="3D world viewport"></canvas>
    <canvas id="map" class="hidden" aria-label="2D tactical map"></canvas>
    <section id="fallback" aria-label="Fallback world status"></section>
    <div class="toolbar">
      <div class="brand">Worlds</div>
      <button data-tier="1">Tier 1</button><button data-tier="2">Tier 2</button><button data-tier="3">Tier 3</button><button data-tier="4">Tier 4</button>
      <span class="pill">Active: <strong id="tierLabel">fallback</strong></span>
      <select id="worldSelect" title="World"></select>
      <select id="presetSelect" title="Operating preset"></select>
      <button id="resetCamera">Reset view</button>
    </div>
    <div class="preset-strip" id="presetStrip" aria-label="Operating presets"></div>
    <div class="viewports" id="viewports"></div>
    <section class="chat" aria-label="Guided chat overlay">
      <div class="chat-head"><strong>Guided overlay</strong><span class="context" id="contextLine"></span></div>
      <div class="chat-log" id="chatLog"></div>
      <form class="chat-compose" id="chatForm"><input id="chatInput" autocomplete="off" placeholder="Tell Nest what to refine…"><button class="primary">Send</button></form>
    </section>
  </main>
  <aside class="panel">
    <div><h1>Explorable simulation</h1><div class="small">Progressive renderer for old tablets → tactical map → 3D → advanced mode.</div></div>
    <div class="box"><h2>Unlocks</h2><div id="unlocks" class="small"></div></div>
    <div class="box"><h2>World state</h2><div id="stats"></div></div>
    <div class="box"><h2>World detail</h2><div id="worldDetail"></div></div>
    <div class="box"><h2>Zones & landmarks</h2><div class="list" id="zoneList"></div></div>
    <div class="box"><h2>Presets</h2><div class="list" id="presetList"></div></div>
    <div class="box"><h2>Selected drone</h2><div id="selectionDetail"></div></div>
    <div class="box"><h2>Drones</h2><div class="list" id="droneList"></div></div>
    <div class="box"><h2>Agent viewports</h2><div class="list" id="agentList"></div></div>
    <div class="box"><h2>Command/event log</h2><div class="list" id="events"></div></div>
  </aside>
</div>
<script>
(function(){
'use strict';
var token = localStorage.getItem('nest_token'); if (!token) location.href = '/login';
var agentProfiles = [
  {id:'scout-eye',name:'Scout Eye',role:'recon coordinator',viewport:'north sweep',intent:'find motion and keep a wide safety picture',stack:['wide camera','thermal','motion classifier'],camera:{x:120,y:180,z:90,yaw:18,pitch:-18,fov:72},rules:['prefer altitude','flag unknown heat','handoff targets']},
  {id:'cartographer',name:'Cartographer',role:'mapping agent',viewport:'topographic',intent:'maintain terrain, obstacles, and route graph',stack:['lidar','orthomap','mesh builder'],camera:{x:590,y:450,z:220,yaw:0,pitch:-82,fov:55},rules:['stitch terrain','mark no-fly','keep overview']},
  {id:'interceptor',name:'Interceptor',role:'close inspection',viewport:'low pursuit',intent:'inspect selected objects from low altitude',stack:['narrow camera','range finder','tracking'],camera:{x:880,y:690,z:65,yaw:-38,pitch:-12,fov:48},rules:['follow selected','avoid landmarks','hold 40m standoff']}
];
var worlds = [
  {id:'harbor',name:'Harbor test world',biome:'industrial coast',mood:'blue dusk / salt haze',bounds:{x:1200,y:900,z:240},gravity:.98,wind:{dir:62,speed:8,gust:14},palette:{ground:'#123047',water:'#0e7490',structure:'#64748b',danger:'#fb7185'},mission:'survey docks, bridge cranes, and waterline traffic',zones:[{id:'dock-a',name:'Dock A',type:'structure',x:120,y:120,w:340,h:180,z:26,color:'#64748b'},{id:'channel',name:'Shipping channel',type:'water',x:430,y:0,w:260,h:900,z:0,color:'#0e7490'},{id:'no-fly-cranes',name:'Crane no-fly volume',type:'hazard',x:760,y:160,w:260,h:180,z:120,color:'#fb7185'}],landmarks:[{id:'tower',name:'Control tower',kind:'beacon',x:980,y:690,z:92},{id:'bridge',name:'Service bridge',kind:'span',x:610,y:420,z:38},{id:'buoy',name:'Marker buoy',kind:'floating',x:500,y:720,z:4}]},
  {id:'forest',name:'Cliffside hillside',biome:'alpine hillside',mood:'green slope / sheer stone drop',bounds:{x:1100,y:1000,z:420},gravity:.98,wind:{dir:286,speed:7,gust:22},palette:{ground:'#166534',water:'#0f766e',structure:'#78350f',danger:'#f97316',cliff:'#78716c'},terrain:{kind:'hillside-cliff',slopeAxis:'x',low:28,high:210,cliffX:710,cliffDrop:190,roughness:18},mission:'survey a grassy hillside, cliff edge, and lower ravine without losing agents below the drop',zones:[{id:'upper-meadow',name:'Upper meadow',type:'slope',x:80,y:120,w:520,h:700,z:160,color:'#16a34a'},{id:'cliff-face',name:'Sheer cliff face',type:'cliff',x:690,y:90,w:80,h:820,z:300,color:'#78716c'},{id:'lower-ravine',name:'Lower ravine',type:'hazard',x:770,y:160,w:250,h:660,z:45,color:'#f97316'}],landmarks:[{id:'cliff-lip',name:'Cliff lip',kind:'edge',x:700,y:500,z:218},{id:'old-pine',name:'Old pine',kind:'tree',x:350,y:330,z:132},{id:'ravine-floor',name:'Ravine floor',kind:'lowland',x:900,y:610,z:35},{id:'lookout',name:'Hill lookout',kind:'tower',x:520,y:210,z:205}]},
  {id:'orbit',name:'Orbital yard',biome:'low orbit service grid',mood:'black glass / station lights',bounds:{x:1500,y:820,z:520},gravity:.12,wind:{dir:0,speed:0,gust:0},palette:{ground:'#111827',water:'#312e81',structure:'#94a3b8',danger:'#f43f5e'},mission:'inspect modular habitats and keep safe lanes around moving debris',zones:[{id:'hab-ring',name:'Habitat ring',type:'structure',x:170,y:160,w:360,h:360,z:80,color:'#94a3b8'},{id:'debris-lane',name:'Debris lane',type:'hazard',x:690,y:80,w:520,h:210,z:260,color:'#f43f5e'},{id:'service-bay',name:'Service bay',type:'dock',x:1040,y:480,w:300,h:220,z:140,color:'#60a5fa'}],landmarks:[{id:'antenna',name:'Long antenna',kind:'mast',x:1320,y:210,z:420},{id:'solar',name:'Solar spine',kind:'array',x:780,y:650,z:120},{id:'airlock',name:'Airlock 3',kind:'dock',x:1120,y:590,z:130}]}
];
var world = Object.assign({tick:0,drones:[],agents:agentProfiles,events:[]}, worlds[0]);
var presets = [
  {id:'legacy',name:'Legacy Tablet',short:'HTML',tier:1,agent:'cartographer',selected:'D-01',zoom:1,panX:0,panY:0,yaw:0,pitch:.75,count:12,note:'lowest power status and feedback mode'},
  {id:'tactical',name:'Tactical Map',short:'2D',tier:2,agent:'cartographer',selected:'D-03',zoom:1.08,panX:0,panY:0,yaw:0,pitch:.75,count:24,note:'touch-friendly swarm command view'},
  {id:'swarm-orbit',name:'Swarm Orbit',short:'3D',tier:3,agent:'scout-eye',selected:'D-07',world:'forest',zoom:1,panX:0,panY:0,yaw:.5,pitch:.72,count:32,note:'wide 3D hillside and cliff formation view'},
  {id:'agent-pov',name:'Agent POV',short:'POV',tier:3,agent:'interceptor',selected:'D-11',world:'forest',zoom:1.35,panX:-90,panY:30,yaw:-.65,pitch:.9,count:24,note:'inspect the cliff lip from a low pursuing camera'},
  {id:'advanced-stress',name:'Advanced Stress',short:'T4',tier:4,agent:'scout-eye',selected:'D-17',world:'forest',zoom:.92,panX:0,panY:0,yaw:.8,pitch:.62,count:72,note:'dense swarm over hillside/cliff, gated by device capability'}
];
var state = {tier:1, preset:'legacy', selected:'D-03', activeAgent:'scout-eye', panX:0, panY:0, zoom:1, yaw:0, pitch:.75, running:true, droneCount:24, gl:null, glProgram:null, capabilities:{canvas:!!window.CanvasRenderingContext2D, webgl:false, webgpu:!!navigator.gpu}};
var el = function(id){return document.getElementById(id)};
function hexToRgb(hex){hex=String(hex||'#ffffff').replace('#','');if(hex.length===3)hex=hex.split('').map(function(c){return c+c}).join('');var n=parseInt(hex,16);return [(n>>16&255)/255,(n>>8&255)/255,(n&255)/255]}
function terrainHeight(x,y){var t=world.terrain;if(!t||t.kind!=='hillside-cliff')return 0;var slope=t.low+(Math.min(x,t.cliffX)/t.cliffX)*(t.high-t.low);var rough=Math.sin(y*.025)*t.roughness+Math.sin((x+y)*.014)*t.roughness*.45;if(x>t.cliffX)slope=t.high-t.cliffDrop+Math.sin(y*.02)*8;return Math.max(0,slope+rough)}
function toGlPoint(x,y,z){return [(x-world.bounds.x/2)/(world.bounds.x*.43),(z-80)/(world.bounds.z*.8),(y-world.bounds.y/2)/(world.bounds.y*.43)]}
var esc = function(s){return String(s == null ? '' : s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})};
function initDrones(count){count=count||state.droneCount||24;world.drones=[];var agents=world.agents||agentProfiles;for(var i=0;i<count;i++){var a=i/count*Math.PI*2;var ring=i%3;var r=120+ring*72+(i%7)*9;var role=i%11===0?'leader':i%7===0?'relay':i%5===0?'mapper':'scout';var agent=agents[i%agents.length];var sensor=role==='mapper'?'lidar':role==='relay'?'comms':role==='leader'?'fusion':'camera';world.drones.push({id:'D-'+String(i+1).padStart(2,'0'),role:role,agentId:agent.id,sensor:sensor,mesh:role==='relay'?'octa relay':'quad scout',intent:role==='mapper'?'build surface mesh':role==='relay'?'maintain swarm network':role==='leader'?'coordinate formation':'sweep assigned sector',x:world.bounds.x/2+Math.cos(a)*r,y:world.bounds.y/2+Math.sin(a)*r,z:terrainHeight(world.bounds.x/2+Math.cos(a)*r,world.bounds.y/2+Math.sin(a)*r)+48+(i%6)*14+ring*8,vx:-Math.sin(a)*(1.0+i%3*.22),vy:Math.cos(a)*(1.0+i%3*.22),battery:48+((i*13)%49),status:i%13===0?'caution':'nominal'});} }
function pushEvent(text,kind){world.events.unshift({time:new Date(),text:text,kind:kind||'info'});world.events=world.events.slice(0,10);renderSide();}
function supportsWebgl(){try{var c=document.createElement('canvas');return !!(window.WebGLRenderingContext&&(c.getContext('webgl')||c.getContext('experimental-webgl')))}catch(e){return false}}
state.capabilities.webgl=supportsWebgl();
function addUnlock(text){var u=el('unlocks');var d=document.createElement('div');d.innerHTML='<span class="unlock">Unlocked:</span> '+esc(text);u.prepend(d)}
function selectTier(t){t=Number(t); if(t>=3&&!state.capabilities.webgl){pushEvent('3D preset requested, but WebGL is unavailable. Staying in best fallback.','warn');t=state.capabilities.canvas?2:1} if(t===4&&!state.capabilities.webgpu){pushEvent('Tier 4 preview active: WebGPU not available, so advanced features are simulated/gated.','warn')} state.tier=t; ['fallback','map','gl'].forEach(function(id){el(id).classList.add('hidden')}); if(t===1)el('fallback').classList.remove('hidden'); if(t===2)el('map').classList.remove('hidden'); if(t>=3)el('gl').classList.remove('hidden'); Array.prototype.forEach.call(document.querySelectorAll('[data-tier]'),function(b){b.classList.toggle('active',Number(b.getAttribute('data-tier'))===t)}); el('tierLabel').textContent=t===1?'fallback HTML':t===2?'2D canvas':t===3?'WebGL 3D':'advanced gated'; renderAll();}
function resizeCanvas(c){var r=c.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);var w=Math.max(1,Math.floor(r.width*dpr)),h=Math.max(1,Math.floor(r.height*dpr));if(c.width!==w||c.height!==h){c.width=w;c.height=h}return {w:w,h:h,dpr:dpr}}
