<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07111f">
<link rel="manifest" href="/manifest.webmanifest">
<title>Nest — Worlds</title>
<style>
  :root{color-scheme:dark;--bg:#07111f;--panel:rgba(12,22,38,.88);--panel2:#0d1b2f;--line:#22344f;--text:#e5edf8;--muted:#8fa3bd;--hot:#67e8f9;--good:#86efac;--warn:#fbbf24;--bad:#fb7185}
  *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 25% 0,#14233f 0,#07111f 42%,#030712 100%);color:var(--text);font:14px/1.42 system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font:inherit} button{touch-action:manipulation}
  .shell{display:grid;grid-template-columns:minmax(0,1fr) 340px;height:100vh;height:100dvh}
  .stage{position:relative;min-width:0;overflow:hidden;background:#050b15}
  .toolbar{position:absolute;z-index:5;top:10px;left:10px;right:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;pointer-events:none}.toolbar>*{pointer-events:auto}
  .brand{font-weight:800;letter-spacing:.2px;background:rgba(7,17,31,.82);border:1px solid var(--line);border-radius:999px;padding:7px 11px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
  .pill{border:1px solid var(--line);background:rgba(12,22,38,.86);color:var(--text);border-radius:999px;padding:7px 10px;font-size:12px}.pill strong{color:var(--hot)}
  .toolbar button,.toolbar select,.panel button,.chat button{background:rgba(12,22,38,.94);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:7px 10px;cursor:pointer}.toolbar button.active,.panel button.primary,.chat button.primary{background:#155e75;border-color:#22d3ee;color:white}.toolbar button:disabled{opacity:.45;cursor:not-allowed}
  #fallback,#map,#gl{position:absolute;inset:0;width:100%;height:100%;display:block}.hidden{display:none!important}
  #fallback{padding:72px 12px 170px;overflow:auto;background:linear-gradient(180deg,#0b1424,#07111f)}
  .fallback-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;max-width:920px}.fallback-card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}.fallback-card.selected{border-color:var(--hot);box-shadow:0 0 0 2px rgba(103,232,249,.12)}.fallback-card h3{margin:0 0 6px;font-size:15px}.fallback-card .meta{font-size:12px;color:var(--muted)}
  .viewports{position:absolute;z-index:4;left:10px;bottom:10px;display:flex;gap:8px;max-width:calc(100% - 360px);overflow:auto;padding-bottom:2px}.viewport{min-width:138px;background:rgba(3,7,18,.74);border:1px solid var(--line);border-radius:12px;padding:8px;backdrop-filter:blur(8px)}.viewport.active{border-color:var(--hot)}.viewport .mini{height:54px;border-radius:8px;background:linear-gradient(135deg,#0e7490,#1e293b);position:relative;overflow:hidden}.viewport .mini:before{content:"";position:absolute;left:48%;top:10%;width:8px;height:80%;background:rgba(255,255,255,.28);transform:rotate(24deg)}.viewport .name{font-size:12px;font-weight:700;margin-top:6px}.viewport .meta{font-size:11px;color:var(--muted)}
  .panel{background:var(--panel);border-left:1px solid var(--line);padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(10px)}.panel h1{font-size:18px;margin:0}.panel h2{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:4px 0 7px}.box{border:1px solid var(--line);background:rgba(13,27,47,.72);border-radius:14px;padding:11px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.stat{display:grid;grid-template-columns:1fr auto;gap:6px;font-size:12px;color:var(--muted);padding:3px 0}.stat strong{color:var(--text);font-variant-numeric:tabular-nums}.list{display:flex;flex-direction:column;gap:6px}.item{border:1px solid var(--line);background:rgba(7,17,31,.6);border-radius:10px;padding:8px;cursor:pointer}.item.selected{border-color:var(--hot);background:rgba(21,94,117,.28)}.item .top{display:flex;justify-content:space-between;gap:8px;font-weight:700}.item .sub{font-size:12px;color:var(--muted);margin-top:2px}.status-ok{color:var(--good)}.status-warn{color:var(--warn)}
  .chat{position:absolute;z-index:6;right:352px;bottom:10px;width:min(420px,calc(100vw - 374px));background:rgba(3,7,18,.82);border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.32);overflow:hidden;backdrop-filter:blur(12px)}.chat-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}.chat-log{max-height:170px;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:7px}.msg{border-radius:10px;padding:8px 9px;font-size:13px}.msg.user{background:#164e63;align-self:flex-end}.msg.nest{background:#111827;border:1px solid var(--line)}.chat-compose{display:flex;gap:7px;padding:9px;border-top:1px solid var(--line)}.chat input{flex:1;min-width:0;background:#07111f;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:8px}.context{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .small{font-size:12px;color:var(--muted)}.unlock{color:var(--good);font-weight:800}.warn{color:var(--warn)}
  @media (max-width:860px){body{overflow:auto}.shell{display:block;height:auto;min-height:100vh}.stage{height:62vh;min-height:380px}.panel{border-left:0;border-top:1px solid var(--line);min-height:38vh}.chat{position:fixed;left:8px;right:8px;bottom:8px;width:auto}.viewports{right:10px;max-width:calc(100% - 20px);bottom:156px}.toolbar{right:8px}.brand{width:100%}}
  @media (max-width:520px){.toolbar{gap:5px}.toolbar button,.toolbar select,.pill{padding:6px 8px;font-size:11px}.stage{height:58vh;min-height:340px}.chat-log{max-height:114px}.viewports{display:none}.panel{padding-bottom:190px}}
</style>
<script src="/sidebar.js"></script>
</head>
<body>
<div class="shell">
  <main class="stage" id="stage">
    <canvas id="gl" class="hidden" aria-label="3D world viewport"></canvas>
    <canvas id="map" class="hidden" aria-label="2D tactical map"></canvas>
    <section id="fallback" aria-label="Fallback world status"></section>
    <div class="toolbar">
      <div class="brand">Worlds</div>
      <button data-tier="1">Tier 1</button><button data-tier="2">Tier 2</button><button data-tier="3">Tier 3</button><button data-tier="4">Tier 4</button>
      <span class="pill">Active: <strong id="tierLabel">fallback</strong></span>
      <select id="worldSelect" title="World"></select>
      <button id="resetCamera">Reset view</button>
    </div>
    <div class="viewports" id="viewports"></div>
    <section class="chat" aria-label="Guided chat overlay">
      <div class="chat-head"><strong>Guided overlay</strong><span class="context" id="contextLine"></span></div>
      <div class="chat-log" id="chatLog"></div>
      <form class="chat-compose" id="chatForm"><input id="chatInput" autocomplete="off" placeholder="Tell Nest what to refine…"><button class="primary">Send</button></form>
    </section>
  </main>
  <aside class="panel">
    <div><h1>Explorable simulation</h1><div class="small">Progressive renderer for old tablets → tactical map → 3D → advanced mode.</div></div>
    <div class="box"><h2>Unlocks</h2><div id="unlocks" class="small"></div></div>
    <div class="box"><h2>World state</h2><div id="stats"></div></div>
    <div class="box"><h2>Drones</h2><div class="list" id="droneList"></div></div>
    <div class="box"><h2>Agent viewports</h2><div class="list" id="agentList"></div></div>
    <div class="box"><h2>Command/event log</h2><div class="list" id="events"></div></div>
  </aside>
</div>
<script>
(function(){
'use strict';
var token = localStorage.getItem('nest_token'); if (!token) location.href = '/login';
var world = {
  id:'harbor', name:'Harbor test world', bounds:{x:1200,y:900,z:240}, tick:0,
  drones:[], agents:[
    {id:'scout-eye',name:'Scout Eye',viewport:'north sweep',camera:{x:120,y:180,z:90,yaw:18}},
    {id:'cartographer',name:'Cartographer',viewport:'topographic',camera:{x:590,y:450,z:220,yaw:0}},
    {id:'interceptor',name:'Interceptor',viewport:'low pursuit',camera:{x:880,y:690,z:65,yaw:-38}}
  ], events:[]
};
var worlds = [{id:'harbor',name:'Harbor test world'},{id:'forest',name:'Forest ridge'},{id:'orbit',name:'Orbital yard'}];
var state = {tier:1, selected:'D-03', activeAgent:'scout-eye', panX:0, panY:0, zoom:1, yaw:0, pitch:.75, running:true, gl:null, glProgram:null, capabilities:{canvas:!!window.CanvasRenderingContext2D, webgl:false, webgpu:!!navigator.gpu}};
var el = function(id){return document.getElementById(id)};
var esc = function(s){return String(s == null ? '' : s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})};
function initDrones(){world.drones=[];for(var i=0;i<24;i++){var a=i/24*Math.PI*2;var r=140+(i%5)*32;world.drones.push({id:'D-'+String(i+1).padStart(2,'0'),role:i%7===0?'relay':i%5===0?'mapper':'scout',x:600+Math.cos(a)*r,y:450+Math.sin(a)*r,z:55+(i%6)*18,vx:-Math.sin(a)*(1.2+i%3*.25),vy:Math.cos(a)*(1.2+i%3*.25),battery:58+((i*13)%39),status:i%9===0?'caution':'nominal'});} }
function pushEvent(text,kind){world.events.unshift({time:new Date(),text:text,kind:kind||'info'});world.events=world.events.slice(0,10);renderSide();}
function supportsWebgl(){try{var c=document.createElement('canvas');return !!(window.WebGLRenderingContext&&(c.getContext('webgl')||c.getContext('experimental-webgl')))}catch(e){return false}}
state.capabilities.webgl=supportsWebgl();
function addUnlock(text){var u=el('unlocks');var d=document.createElement('div');d.innerHTML='<span class="unlock">Unlocked:</span> '+esc(text);u.prepend(d)}
function selectTier(t){t=Number(t); if(t===3&&!state.capabilities.webgl){pushEvent('Tier 3 requested, but WebGL is unavailable. Staying in best fallback.','warn');t=state.capabilities.canvas?2:1} if(t===4&&!state.capabilities.webgpu){pushEvent('Tier 4 preview active: WebGPU not available, so advanced features are simulated/gated.','warn')} state.tier=t; ['fallback','map','gl'].forEach(function(id){el(id).classList.add('hidden')}); if(t===1)el('fallback').classList.remove('hidden'); if(t===2)el('map').classList.remove('hidden'); if(t>=3)el('gl').classList.remove('hidden'); Array.prototype.forEach.call(document.querySelectorAll('[data-tier]'),function(b){b.classList.toggle('active',Number(b.getAttribute('data-tier'))===t)}); el('tierLabel').textContent=t===1?'fallback HTML':t===2?'2D canvas':t===3?'WebGL 3D':'advanced gated'; renderAll();}
function resizeCanvas(c){var r=c.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);var w=Math.max(1,Math.floor(r.width*dpr)),h=Math.max(1,Math.floor(r.height*dpr));if(c.width!==w||c.height!==h){c.width=w;c.height=h}return {w:w,h:h,dpr:dpr}}
function renderFallback(){var sel=world.drones.filter(function(d){return d.id===state.selected})[0];el('fallback').innerHTML='<h2>Tier 1 fallback control surface</h2><p class="small">Plain HTML view for old phones/tablets. Select drones and use the guided overlay without GPU rendering.</p><div class="fallback-grid">'+world.drones.map(function(d){return '<div class="fallback-card '+(d.id===state.selected?'selected':'')+'" data-drone="'+esc(d.id)+'"><h3>'+esc(d.id)+' · '+esc(d.role)+'</h3><div class="meta">x '+d.x.toFixed(0)+' · y '+d.y.toFixed(0)+' · z '+d.z.toFixed(0)+'<br>battery '+d.battery+'% · '+esc(d.status)+'</div></div>'}).join('')+'</div>'+(sel?'<p class="small">Selected '+esc(sel.id)+'. Overlay messages now include this selection.</p>':'');}
function mapToScreen(d,w,h){var scale=Math.min(w/world.bounds.x,h/world.bounds.y)*state.zoom*.88;return {x:w/2+(d.x-world.bounds.x/2)*scale+state.panX,y:h/2+(d.y-world.bounds.y/2)*scale+state.panY,scale:scale}}
function renderMap(){var c=el('map'),r=resizeCanvas(c),ctx=c.getContext('2d');ctx.clearRect(0,0,r.w,r.h);ctx.fillStyle='#06101d';ctx.fillRect(0,0,r.w,r.h);ctx.strokeStyle='#1f3b5d';ctx.lineWidth=1;for(var gx=0;gx<=world.bounds.x;gx+=100){var a=mapToScreen({x:gx,y:0},r.w,r.h),b=mapToScreen({x:gx,y:world.bounds.y},r.w,r.h);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}for(var gy=0;gy<=world.bounds.y;gy+=100){var c1=mapToScreen({x:0,y:gy},r.w,r.h),c2=mapToScreen({x:world.bounds.x,y:gy},r.w,r.h);ctx.beginPath();ctx.moveTo(c1.x,c1.y);ctx.lineTo(c2.x,c2.y);ctx.stroke()}world.drones.forEach(function(d){var p=mapToScreen(d,r.w,r.h);ctx.beginPath();ctx.arc(p.x,p.y,d.id===state.selected?9:5,0,Math.PI*2);ctx.fillStyle=d.status==='nominal'?'#67e8f9':'#fbbf24';ctx.fill();ctx.strokeStyle=d.id===state.selected?'#fff':'rgba(255,255,255,.25)';ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+d.vx*8,p.y+d.vy*8);ctx.strokeStyle='#a7f3d0';ctx.stroke();});}
function initGl(){var gl=el('gl').getContext('webgl')||el('gl').getContext('experimental-webgl'); if(!gl)return; state.gl=gl; var vs='attribute vec3 p;attribute vec3 c;uniform mat4 m;varying vec3 v;void main(){v=c;gl_PointSize=8.0;gl_Position=m*vec4(p,1.0);}'; var fs='precision mediump float;varying vec3 v;void main(){float d=distance(gl_PointCoord,vec2(.5));if(d>.5)discard;gl_FragColor=vec4(v,1.0);}'; function sh(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s} var pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);state.glProgram=pr;}
function renderGl(){if(!state.gl)initGl();var gl=state.gl;if(!gl)return;var r=resizeCanvas(el('gl'));gl.viewport(0,0,r.w,r.h);gl.clearColor(.02,.05,.1,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);var pts=[];world.drones.forEach(function(d){pts.push((d.x-600)/520,(d.z-80)/190,(d.y-450)/390,d.id===state.selected?1:.3,d.status==='nominal'?.9:.7,d.status==='nominal'?1:.1)});var buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pts),gl.STATIC_DRAW);gl.useProgram(state.glProgram);var p=gl.getAttribLocation(state.glProgram,'p'),c=gl.getAttribLocation(state.glProgram,'c');gl.enableVertexAttribArray(p);gl.vertexAttribPointer(p,3,gl.FLOAT,false,24,0);gl.enableVertexAttribArray(c);gl.vertexAttribPointer(c,3,gl.FLOAT,false,24,12);var asp=r.w/r.h, cy=Math.cos(state.yaw), sy=Math.sin(state.yaw), cp=Math.cos(state.pitch), sp=Math.sin(state.pitch);var m=[cp/asp,sp*sy,0,0,0,cy,0,0,sp/asp,-cp*sy,1,0,0,0,0,1];gl.uniformMatrix4fv(gl.getUniformLocation(state.glProgram,'m'),false,new Float32Array(m));gl.drawArrays(gl.POINTS,0,world.drones.length);gl.deleteBuffer(buf);}
function renderViewports(){el('viewports').innerHTML=world.agents.map(function(a){return '<div class="viewport '+(a.id===state.activeAgent?'active':'')+'" data-agent="'+esc(a.id)+'"><div class="mini"></div><div class="name">'+esc(a.name)+'</div><div class="meta">'+esc(a.viewport)+'</div></div>'}).join('')}
function renderSide(){var nominal=world.drones.filter(function(d){return d.status==='nominal'}).length;el('stats').innerHTML='<div class="stat"><span>World</span><strong>'+esc(world.name)+'</strong></div><div class="stat"><span>Drones</span><strong>'+world.drones.length+'</strong></div><div class="stat"><span>Nominal</span><strong>'+nominal+'</strong></div><div class="stat"><span>Renderer</span><strong>Tier '+state.tier+'</strong></div><div class="stat"><span>WebGL</span><strong class="'+(state.capabilities.webgl?'status-ok':'status-warn')+'">'+(state.capabilities.webgl?'yes':'no')+'</strong></div><div class="stat"><span>WebGPU</span><strong class="'+(state.capabilities.webgpu?'status-ok':'status-warn')+'">'+(state.capabilities.webgpu?'yes':'no')+'</strong></div>'; el('droneList').innerHTML=world.drones.slice(0,8).map(function(d){return '<div class="item '+(d.id===state.selected?'selected':'')+'" data-drone="'+esc(d.id)+'"><div class="top"><span>'+esc(d.id)+'</span><span>'+d.battery+'%</span></div><div class="sub">'+esc(d.role)+' · '+esc(d.status)+' · z '+d.z.toFixed(0)+'</div></div>'}).join(''); el('agentList').innerHTML=world.agents.map(function(a){return '<div class="item '+(a.id===state.activeAgent?'selected':'')+'" data-agent="'+esc(a.id)+'"><div class="top"><span>'+esc(a.name)+'</span><span>'+esc(a.viewport)+'</span></div><div class="sub">camera '+a.camera.x+','+a.camera.y+','+a.camera.z+'</div></div>'}).join(''); el('events').innerHTML=world.events.map(function(e){return '<div class="item"><div class="sub">'+e.time.toLocaleTimeString()+'</div><div>'+esc(e.text)+'</div></div>'}).join('')||'<div class="small">No events yet.</div>'; updateContext();}
function updateContext(){var agent=world.agents.filter(function(a){return a.id===state.activeAgent})[0];el('contextLine').textContent='tier='+state.tier+' world='+world.id+' selected='+state.selected+' viewport='+(agent?agent.viewport:'none');}
function renderAll(){renderFallback();renderViewports();renderSide();if(state.tier===2)renderMap();if(state.tier>=3)renderGl();}
function tick(){world.tick++;world.drones.forEach(function(d,i){d.x+=d.vx;d.y+=d.vy;if(d.x<80||d.x>1120)d.vx*=-1;if(d.y<80||d.y>820)d.vy*=-1;d.z+=Math.sin((world.tick+i)/34)*.18;});if(state.tier===2)renderMap();if(state.tier>=3)renderGl();if(world.tick%90===0)renderSide();requestAnimationFrame(tick)}
function captureContext(){var agent=world.agents.filter(function(a){return a.id===state.activeAgent})[0];return {tier:state.tier,world:world.id,selected:state.selected,viewport:agent?agent.viewport:null,camera:agent?agent.camera:null,capabilities:state.capabilities,tick:world.tick}}
function chat(text){if(!text)return;var log=el('chatLog');log.innerHTML+='<div class="msg user">'+esc(text)+'</div>';var ctx=captureContext();var reply='Captured feedback with context: '+ctx.world+' / tier '+ctx.tier+' / '+ctx.selected+'. Next backend slice can send this to OpenClaw as a structured refinement request.';log.innerHTML+='<div class="msg nest">'+esc(reply)+'</div>';log.scrollTop=log.scrollHeight;pushEvent('Feedback captured: '+text,'chat')}
function handlePick(clientX,clientY){if(state.tier===1)return;var c=state.tier===2?el('map'):el('gl'),rect=c.getBoundingClientRect(),x=(clientX-rect.left)*(c.width/rect.width),y=(clientY-rect.top)*(c.height/rect.height),best=null,bd=99999;if(state.tier===2){world.drones.forEach(function(d){var p=mapToScreen(d,c.width,c.height),dist=Math.hypot(p.x-x,p.y-y);if(dist<bd){bd=dist;best=d}});if(best&&bd<28){state.selected=best.id;pushEvent('Selected '+best.id);renderAll()}}}
initDrones();worlds.forEach(function(w){var o=document.createElement('option');o.value=w.id;o.textContent=w.name;el('worldSelect').appendChild(o)});el('worldSelect').value=world.id;document.body.addEventListener('click',function(e){var d=e.target.closest('[data-drone]');if(d){state.selected=d.getAttribute('data-drone');renderAll()}var a=e.target.closest('[data-agent]');if(a){state.activeAgent=a.getAttribute('data-agent');renderAll()}});el('stage').addEventListener('click',function(e){handlePick(e.clientX,e.clientY)});Array.prototype.forEach.call(document.querySelectorAll('[data-tier]'),function(b){b.onclick=function(){selectTier(b.getAttribute('data-tier'))}});el('resetCamera').onclick=function(){state.panX=0;state.panY=0;state.zoom=1;state.yaw=0;state.pitch=.75;pushEvent('View reset');renderAll()};el('chatForm').onsubmit=function(e){e.preventDefault();var i=el('chatInput');chat(i.value.trim());i.value=''};window.addEventListener('resize',renderAll);addUnlock('Foundation: shared world state + guided overlay context capture');addUnlock('Tier 1: old-device HTML fallback');if(state.capabilities.canvas)addUnlock('Tier 2: Canvas tactical map available');if(state.capabilities.webgl)addUnlock('Tier 3: WebGL 3D renderer available');if(state.capabilities.webgpu)addUnlock('Tier 4: WebGPU advanced path available');else addUnlock('Tier 4: advanced mode gated with graceful fallback');pushEvent('Worlds page booted');selectTier(state.capabilities.webgl?3:(state.capabilities.canvas?2:1));tick();
})();
</script>
</body>
</html>
