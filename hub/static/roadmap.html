<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Roadmap</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#1a1a2e;color:#d0d0d0;font:14px/1.6 system-ui,sans-serif}.top{background:#16162a;color:#fff;padding:12px 16px;border-bottom:1px solid #2a2a4a}.top a{color:#7eb8ff;text-decoration:none;font-weight:700}.page{max-width:960px;margin:0 auto;padding:16px 16px 40px}.card{background:#16162a;border:1px solid #2a2a4a;border-radius:12px;padding:18px;white-space:pre-wrap;font-family:ui-monospace,monospace}</style></head><body><div class="top"><a href="/settings">Back</a></div><div class="page"><h1 style="color:#fff">Roadmap</h1><div class="card" id="app">Loading…</div></div><script>const t=localStorage.getItem("nest_token");fetch("/api/roadmap",{headers:t?{Authorization:"Bearer "+t}:{}}).then(r=>r.json()).then(d=>document.getElementById("app").textContent=d.content||"No roadmap").catch(e=>document.getElementById("app").textContent=e.message||"Failed");</script></body></html>
