<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Artifacts</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#f5f5f5;color:#1a1a2e;font:14px/1.45 system-ui,sans-serif}.top{background:#1a1a2e;color:#fff;padding:12px 16px}.top a{color:#7eb8ff;text-decoration:none;font-weight:700}.page{max-width:960px;margin:0 auto;padding:16px}.grid{display:grid;gap:8px}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px}.btn{border:0;background:#1a1a2e;color:#fff;padding:8px 10px;border-radius:8px;cursor:pointer}.viewer{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-top:16px}.pre{white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:12px}</style></head><body><div class="top"><a href="/">Back</a></div><div class="page"><h1>Artifacts</h1><div id="list">Loading…</div><div id="viewer"></div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));async function api(p){const r=await fetch("/api"+p,{headers:{Authorization:"Bearer "+t}});if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";throw new Error("Unauthorized")}const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||("API error "+r.status));return d}async function view(path){const d=await api("/artifacts/view/"+path);if(d.kind==="image"){viewer.innerHTML='<div class="viewer"><h3>'+esc(d.path)+'</h3><img style="max-width:100%" src="data:'+esc(d.mime)+';base64,'+d.contentBase64+'"></div>'}else{viewer.innerHTML='<div class="viewer"><h3>'+esc(d.path)+'</h3><div class="pre">'+esc(d.content)+'</div></div>'}}async function load(){try{const d=await api("/artifacts");list.innerHTML='<div class="grid">'+(d.artifacts||[]).map(a=>'<div class="row"><div><div>'+esc(a.path)+'</div><div style="color:#777;font-size:12px">'+esc(a.kind)+' · '+esc(a.modified)+'</div></div><button class="btn" data-path="'+encodeURIComponent(a.path)+'">Open</button></div>').join("")+'</div>';document.querySelectorAll("[data-path]").forEach(b=>b.onclick=()=>view(decodeURIComponent(b.dataset.path)))}catch(e){list.textContent=e.message||"Failed"}}load();</script></body></html>
