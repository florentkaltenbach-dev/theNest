<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Projects</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#1a1a2e;color:#fff;font:14px/1.45 system-ui,sans-serif}.top{padding:12px 16px;background:#16162a;border-bottom:1px solid #2a2a4a}.top a{color:#7eb8ff;text-decoration:none;font-weight:700}.page{max-width:960px;margin:0 auto;padding:16px}.btn{border:0;border-radius:8px;padding:8px 12px;font:inherit;cursor:pointer;background:#7eb8ff;color:#1a1a2e;font-weight:700}.card{background:#16162a;border:1px solid #2a2a4a;border-radius:10px;padding:16px;margin-bottom:12px}.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}.muted{color:#6b7280;font-size:12px}.inst{background:#0d0d1a;border-radius:6px;padding:8px;margin-top:6px}</style></head><body><div class="top"><a href="/">Back</a></div><div class="page"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h1>Projects</h1><button class="btn" id="discover">Discover</button></div><div id="app">Loading…</div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));const styles={active:["#22c55e20","#22c55e"],dirty:["#eab30820","#eab308"],orphaned:["#ef444420","#ef4444"],untracked:["#6b728020","#6b7280"]};async function api(p,o={}){const h={...(o.headers||{}),Authorization:"Bearer "+t};if(o.body)h["Content-Type"]="application/json";const r=await fetch("/api"+p,{...o,headers:h});if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";throw new Error("Unauthorized")}const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||("API error "+r.status));return d}async function load(){try{const d=await api("/projects");app.innerHTML=(d.projects||[]).map(p=>{const st=styles[p.status]||styles.untracked;return '<div class="card"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:18px;font-weight:700">'+esc(p.name)+'</div>'+(p.github?.fullName?'<div class="muted">'+esc(p.github.fullName)+'</div>':'')+'</div><span class="badge" style="background:'+st[0]+';color:'+st[1]+'">'+esc(p.status)+'</span></div>'+(p.instances||[]).map(i=>'<div class="inst">'+esc(i.host)+':'+esc(i.path)+'<div class="muted">'+esc(i.branch||"")+' '+esc((i.commit||"").slice(0,8))+(i.dirty?' · dirty':'')+'</div></div>').join("")+(p.containers||[]).map(c=>'<div class="inst">'+esc(c.name)+' <span class="muted">'+esc(c.status)+'</span></div>').join("")+'</div>'}).join("")||"No projects"}catch(e){app.textContent=e.message||"Failed"}}document.getElementById("discover").onclick=async()=>{try{await api("/projects/discover",{method:"POST"});setTimeout(load,1200)}catch(e){alert(e.message||"Failed")}};load();</script></body></html>
