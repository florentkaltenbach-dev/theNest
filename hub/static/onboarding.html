<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Onboarding</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#171c2b;color:#161a28;font:16px/1.45 system-ui,sans-serif;padding:24px}.card{width:100%;max-width:520px;background:#fff;border-radius:18px;padding:28px}input,button{font:inherit}.input{width:100%;padding:14px 16px;border:1px solid #d7dce5;border-radius:10px;margin-bottom:10px}.btn{width:100%;background:#1a1a2e;color:#fff;border:0;border-radius:10px;padding:12px 14px;font-weight:700;cursor:pointer}.status{margin-top:10px;min-height:20px}</style></head><body><div class="card"><h1>Onboarding</h1><p id="state">Checking setup…</p><input id="hetzner" class="input" placeholder="Hetzner API token"><input id="adminPassword" class="input" placeholder="Admin password" type="password"><input id="gitName" class="input" placeholder="Git user name (optional)"><input id="gitEmail" class="input" placeholder="Git email (optional)"><button class="btn" id="submit">Complete Setup</button><div class="status" id="status"></div></div><script>async function refresh(){const r=await fetch("/api/setup/status");const d=await r.json();document.getElementById("state").textContent=d.needsSetup?"Setup incomplete":"Setup already complete"}document.getElementById("submit").onclick=async()=>{try{const r=await fetch("/api/setup/complete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({hetznerToken:hetzner.value,adminPassword:adminPassword.value,gitName:gitName.value||undefined,gitEmail:gitEmail.value||undefined})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||"Failed");status.textContent="Setup complete";refresh()}catch(e){status.textContent=e.message||"Failed"}};refresh();</script></body></html>
