<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nest — Tokens</title>
<style>
:root {
  --bg: #f3f1eb;
  --ink: #1d241f;
  --muted: #6f766f;
  --card: #fffdf7;
  --line: #e4dfd4;
  --green: #2f7d4f;
  --amber: #b7791f;
  --red: #c24635;
  --blue: #356ccf;
  --sand: #ece4d5;
  --chip: #f0eadf;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Nav */
.nav { display: flex; gap: 0; background: #1a1a2e; padding: 0 8px; }
.nav a {
  color: #8b8fa3; text-decoration: none; font-size: 12px; font-weight: 600;
  padding: 10px 14px; letter-spacing: 0.4px;
}
.nav a:hover { color: #d7d9e0; }
.nav a.active { color: #fff; border-bottom: 2px solid #7eb8ff; }

.container { max-width: 640px; margin: 0 auto; padding: 0 16px 32px; }

/* Loading & error */
.center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; padding: 24px; text-align: center;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--line);
  border-top-color: var(--ink); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-text { color: var(--red); font-size: 14px; line-height: 20px; }
.retry-btn {
  background: var(--ink); color: #fff; border: none; border-radius: 12px;
  padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px;
}
.retry-btn:active { opacity: 0.8; }

/* Hero */
.hero {
  background: #1f3b2f; border-radius: 20px; padding: 20px;
  margin-top: 16px; margin-bottom: 20px;
}
.hero-title { color: #f7f4ec; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
.hero-subtitle { color: #d4ddcf; font-size: 14px; line-height: 20px; }
.hero-stats { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }

/* Section header */
.section-header { margin-bottom: 10px; }
.eyebrow {
  color: var(--amber); text-transform: uppercase; letter-spacing: 1.2px;
  font-size: 11px; font-weight: 700; margin-bottom: 4px;
}
.section-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.section-note { color: var(--muted); font-size: 13px; line-height: 19px; margin-bottom: 8px; }

/* Cards */
.card {
  background: var(--card); border-radius: 18px; padding: 16px;
  border: 1px solid var(--line); margin-bottom: 12px;
}
.note-card {
  background: var(--sand); border-radius: 18px; padding: 16px;
  border: 1px solid #d8ccb8; margin-bottom: 12px;
}
.note-title { font-size: 15px; font-weight: 800; margin-bottom: 8px; }
.note-body { color: #4b514d; font-size: 13px; line-height: 20px; }
.card-title { font-size: 16px; font-weight: 800; }
.card-meta { color: var(--muted); font-size: 12px; margin-top: 8px; }

/* Meters */
.row-spread { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.percent-text { font-size: 22px; font-weight: 800; }
.meter-track {
  height: 10px; background: #ece7dc; border-radius: 999px;
  overflow: hidden; margin-top: 12px;
}
.meter-fill {
  height: 100%; border-radius: 999px;
  transition: width 0.3s ease;
}

/* Stat pills */
.summary-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.stat-pill {
  background: var(--chip); border-radius: 14px;
  padding: 10px 12px; min-width: 100px;
}
.stat-label {
  color: var(--muted); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 4px;
}
.stat-value { font-size: 14px; font-weight: 800; }

/* Window history */
.window-row { margin-bottom: 10px; }
.window-row-top { display: flex; justify-content: space-between; gap: 12px; }
.window-label { color: var(--muted); font-size: 12px; flex: 1; }
.window-value { font-size: 12px; font-weight: 800; }

/* Scope chips */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.scope-chip {
  background: #eef2ff; border-radius: 999px;
  padding: 6px 10px;
}
.scope-text { color: #4055a8; font-size: 12px; font-weight: 700; }

/* Detail lines */
.detail-line { color: #404742; font-size: 13px; line-height: 19px; margin-top: 10px; }
.detail-line:first-child { margin-top: 10px; }

/* Grid gap */
.grid { margin-bottom: 12px; }
.grid > .card { margin-bottom: 12px; }

/* Footer */
.footer {
  color: #8a9088; text-align: center; font-size: 12px;
  margin-top: 8px; padding-bottom: 16px;
}

/* Refresh button in hero */
.refresh-btn {
  background: rgba(255,255,255,0.12); border: none; color: #d4ddcf;
  padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; margin-top: 12px;
}
.refresh-btn:active { opacity: 0.7; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/tokens" class="active">Tokens</a>
  <a href="/claw">Claw</a>
  <a href="/html/scripts.html">Scripts</a>
</nav>
<div class="container" id="app"></div>
<script>
// ── Auth ──
const TOKEN = localStorage.getItem('nest_token');
if (!TOKEN) location.href = '/login';

// ── API helper ──
async function api(path) {
  const res = await fetch('/api' + path, {
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });
  if (res.status === 401) { location.href = '/login'; return null; }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || body.detail || 'API error ' + res.status);
  }
  return res.json();
}

// ── XSS safety ──
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Utility functions (ported from tokens.tsx) ──
function clampPercent(v) { return Math.max(0, Math.min(100, Math.round(v))); }

function toneForPercent(pct) {
  if (pct >= 85) return 'var(--red)';
  if (pct >= 60) return 'var(--amber)';
  return 'var(--green)';
}

function formatCountdown(seconds) {
  if (seconds <= 0) return 'now';
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  if (m > 0) return m + 'm';
  return Math.floor(seconds) + 's';
}

function formatAgo(ms) {
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + 'm ago';
  const h = Math.floor(min / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function formatRelativeTime(iso) {
  if (!iso) return 'unknown';
  return formatAgo(Date.now() - new Date(iso).getTime());
}

function formatAbsolute(iso) {
  if (!iso) return 'unknown';
  return new Date(iso).toLocaleString();
}

function formatPlan(plan) {
  if (plan === 'plus') return 'ChatGPT Plus';
  if (plan === 'pro') return 'ChatGPT Pro';
  return plan || 'unknown';
}

// ── State ──
let limits = null, waste = null, codex = null;
let limitsError = null, codexError = null;
let loading = true;
let fetchedAt = Date.now();

// ── Component renderers ──
function renderStatPill(label, value, tone) {
  return '<div class="stat-pill"><div class="stat-label">' + esc(label) +
    '</div><div class="stat-value" style="color:' + tone + '">' + esc(value) + '</div></div>';
}

function renderMeter(label, pct, detail, accent) {
  const safe = clampPercent(pct);
  const color = accent || toneForPercent(safe);
  return '<div class="card"><div class="row-spread"><span class="card-title">' + esc(label) +
    '</span><span class="percent-text" style="color:' + color + '">' + safe +
    '%</span></div><div class="meter-track"><div class="meter-fill" style="width:' + safe +
    '%;background:' + color + '"></div></div><div class="card-meta">' + esc(detail) + '</div></div>';
}

function renderSectionTitle(eyebrow, title, note) {
  return '<div class="section-header"><div class="eyebrow">' + esc(eyebrow) +
    '</div><div class="section-title">' + esc(title) +
    '</div><div class="section-note">' + esc(note) + '</div></div>';
}

function renderWindowHistory(windows) {
  if (!windows || windows.length === 0) {
    return '<div class="card"><div class="card-title">Recent Claude windows</div>' +
      '<div class="card-meta">No completed 5-hour windows recorded yet.</div></div>';
  }
  let rows = '';
  const reversed = windows.slice().reverse();
  for (const w of reversed) {
    const pct = clampPercent(w.peak_pct);
    const color = toneForPercent(pct);
    rows += '<div class="window-row"><div class="window-row-top"><span class="window-label">' +
      esc(formatAbsolute(w.ended)) + '</span><span class="window-value" style="color:' + color + '">' +
      pct + '% peak</span></div><div class="meter-track"><div class="meter-fill" style="width:' +
      pct + '%;background:' + color + '"></div></div></div>';
  }
  return '<div class="card"><div class="card-title">Recent Claude windows</div>' +
    '<div style="margin-top:12px">' + rows + '</div></div>';
}

function renderScopeChips(scopes) {
  if (!scopes || scopes.length === 0) return '';
  let chips = '';
  for (const s of scopes) {
    chips += '<div class="scope-chip"><span class="scope-text">' + esc(s) + '</span></div>';
  }
  return '<div class="card"><div class="card-title">Codex token scopes</div>' +
    '<div class="chip-row">' + chips + '</div></div>';
}

// ── Countdown drift correction ──
function adjustedCountdown(remainingSeconds) {
  const elapsed = (Date.now() - fetchedAt) / 1000;
  return formatCountdown(Math.max(0, remainingSeconds - elapsed));
}

// ── Main render ──
function render() {
  const app = document.getElementById('app');

  if (loading) {
    app.innerHTML = '<div class="center"><div class="spinner"></div></div>';
    return;
  }

  if (limitsError && codexError && !limits && !codex) {
    app.innerHTML = '<div class="center"><div class="error-text">' + esc(limitsError) +
      '</div><button class="retry-btn" onclick="loading=true;render();load();">Retry</button></div>';
    return;
  }

  const sessionPct = clampPercent(limits ? limits.session.utilization_pct : 0);
  const weeklyPct = clampPercent(limits ? limits.weekly.utilization_pct : 0);
  const currentPeak = clampPercent(waste ? waste.current_session_pct : sessionPct);
  const weekBurned = waste ? waste.week_total_burned : 0;
  const weekWindows = waste ? waste.week_total_windows : 0;
  const weekUnused = Math.max(0, weekWindows * 100 - weekBurned);
  const weekAvg = waste ? waste.week_avg_pct : 0;
  const codexHealthy = codex ? !codex.token_expired : false;

  let html = '';

  // Hero
  html += '<div class="hero"><div class="hero-title">Token Control</div>' +
    '<div class="hero-subtitle">Dense telemetry for Claude windows and Codex auth health.</div>' +
    '<div class="hero-stats">' +
    renderStatPill('Claude session', sessionPct + '%', toneForPercent(sessionPct)) +
    renderStatPill('Claude weekly', weeklyPct + '%', toneForPercent(weeklyPct)) +
    renderStatPill('Codex', codex ? (codexHealthy ? 'active' : 'expired') : 'unknown',
      codexHealthy ? 'var(--green)' : 'var(--red)') +
    '</div><button class="refresh-btn" onclick="load()">Refresh</button></div>';

  // Claude section
  html += renderSectionTitle('Claude', 'Window pressure',
    'This tracks Anthropic unified rate window usage, not per-message token counts.');

  if (limitsError && !limits) {
    html += '<div class="card"><div class="error-text">' + esc(limitsError) + '</div></div>';
  } else if (limits) {
    html += '<div class="grid">' +
      renderMeter('5-hour window', limits.session.utilization_pct,
        'Resets in ' + adjustedCountdown(limits.session.remaining_seconds)) +
      renderMeter('7-day window', limits.weekly.utilization_pct,
        'Resets in ' + adjustedCountdown(limits.weekly.remaining_seconds)) +
      '</div>';

    html += '<div class="card"><div class="card-title">Claude summary</div><div class="summary-grid">' +
      renderStatPill('Status', limits.status, limits.status === 'allowed' ? 'var(--green)' : 'var(--red)') +
      renderStatPill('Plan', limits.subscription, 'var(--blue)') +
      renderStatPill('Overage', limits.overage_available ? 'available' : 'off',
        limits.overage_available ? 'var(--blue)' : 'var(--muted)') +
      renderStatPill('Current peak', currentPeak + '%', toneForPercent(currentPeak)) +
      renderStatPill('Week avg burn', weekAvg + '%', 'var(--ink)') +
      renderStatPill('Unused headroom', weekUnused + '%', 'var(--amber)') +
      '</div></div>';

    html += renderWindowHistory(waste ? waste.completed_windows : []);
  }

  // Codex section
  html += renderSectionTitle('Codex', 'Auth and subscription',
    'ChatGPT auth mode exposes token/session health. It does not expose true per-request token spend.');

  if (codexError && !codex) {
    html += '<div class="card"><div class="card-meta">Codex is not configured. Run `codex login` on the Nest host.</div></div>';
  } else if (codex) {
    const tokenLifePct = codex.token_lifetime_seconds > 0
      ? ((codex.token_lifetime_seconds - codex.token_remaining_seconds) / codex.token_lifetime_seconds) * 100
      : 0;
    const tokenDetail = codex.token_expired
      ? 'Expired ' + formatRelativeTime(codex.token_expires)
      : 'Expires in ' + adjustedCountdown(codex.token_remaining_seconds);

    html += '<div class="grid">' +
      renderMeter('Access token life used', tokenLifePct, tokenDetail,
        codex.token_expired ? 'var(--red)' : 'var(--blue)') +
      '<div class="card"><div class="card-title">Codex summary</div><div class="summary-grid">' +
      renderStatPill('Plan', formatPlan(codex.plan), 'var(--blue)') +
      renderStatPill('Mode', codex.auth_mode, 'var(--ink)') +
      renderStatPill('Token', codex.token_expired ? 'expired' : 'valid',
        codex.token_expired ? 'var(--red)' : 'var(--green)') +
      renderStatPill('Scopes', String(codex.scopes.length), 'var(--ink)') +
      renderStatPill('Orgs', String(codex.organization_count), 'var(--ink)') +
      renderStatPill('Refreshed', formatRelativeTime(codex.last_refresh), 'var(--ink)') +
      '</div></div></div>';

    html += '<div class="card"><div class="card-title">Codex identity</div>';
    if (codex.email) html += '<div class="detail-line">Account: ' + esc(codex.email) + '</div>';
    if (codex.subscription_active_until)
      html += '<div class="detail-line">Subscription active until: ' + esc(formatAbsolute(codex.subscription_active_until)) + '</div>';
    html += '<div class="detail-line">Token issued: ' + esc(formatAbsolute(codex.token_issued)) + '</div>';
    html += '<div class="detail-line">Token expires: ' + esc(formatAbsolute(codex.token_expires)) + '</div>';
    if (codex.account_id) html += '<div class="detail-line">Account ID: ' + esc(codex.account_id) + '</div>';
    html += '</div>';

    html += renderScopeChips(codex.scopes);

    html += '<div class="note-card"><div class="note-title">What this still cannot show</div>' +
      '<div class="note-body">In ChatGPT OAuth mode, Codex does not expose request-by-request token usage through this local auth file. ' +
      'If you want actual spend or per-task token accounting, Nest needs to route Codex through API-key mode and log each call centrally.</div></div>';
  }

  html += '<div class="footer" id="footer">Last updated just now</div>';
  app.innerHTML = html;
}

// ── Data loading ──
async function load() {
  const [lResult, wResult, cResult] = await Promise.allSettled([
    api('/tokens/limits'),
    api('/tokens/waste'),
    api('/tokens/codex/status'),
  ]);

  if (lResult.status === 'fulfilled' && lResult.value) {
    limits = lResult.value;
    limitsError = null;
  } else {
    limitsError = (lResult.reason && lResult.reason.message) || 'Failed to fetch Claude limits';
  }

  if (wResult.status === 'fulfilled' && wResult.value) {
    waste = wResult.value;
  }

  if (cResult.status === 'fulfilled' && cResult.value) {
    codex = cResult.value;
    codexError = null;
  } else {
    codexError = (cResult.reason && cResult.reason.message) || 'Codex not configured';
  }

  fetchedAt = Date.now();
  loading = false;
  render();
}

// ── Timers ──
setInterval(load, 5 * 60 * 1000);
setInterval(function() {
  var el = document.getElementById('footer');
  if (el) el.textContent = 'Last updated ' + formatAgo(Date.now() - fetchedAt);
}, 30000);

// ── Init ──
load();
</script>
</body>
</html>
