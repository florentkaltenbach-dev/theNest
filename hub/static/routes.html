<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Routes</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#f5f5f5;color:#1a1a2e;font:14px/1.45 system-ui,sans-serif}.top{background:#1a1a2e;color:#fff;padding:12px 16px}.nav a{color:#8b8fa3;text-decoration:none;margin-right:12px;font-weight:700;font-size:12px}.nav a.active{color:#fff}.page{max-width:960px;margin:0 auto;padding:16px}.group{margin-bottom:12px}.name{font-size:12px;color:#777;text-transform:uppercase;margin-bottom:4px}.body{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}.row{display:flex;gap:10px;align-items:center;padding:8px 10px;border-bottom:1px solid #f0f0f0}.row:last-child{border-bottom:0}.m{width:54px;text-align:center;border-radius:4px;padding:3px 0;color:#fff;font-size:10px;font-weight:700}.u{font-family:monospace}</style></head><body><div class="top"><div class="nav"><a href="/">Servers</a><a href="/routes" class="active">Routes</a><a href="/commands">Commands</a><a href="/settings">Settings</a></div></div><div class="page"><h1>API Routes</h1><div id="app">Loading…</div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const c={GET:"#22c55e",POST:"#3b82f6",PUT:"#f59e0b",PATCH:"#f59e0b",DELETE:"#ef4444",WS:"#8b5cf6"};const esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));fetch("/api/routes",{headers:{Authorization:"Bearer "+t}}).then(async r=>{if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";return;}const d=await r.json();const groups={};for(const x of d.routes||[]){const p=x.url.split("/").filter(Boolean);let k=p[0]||"root";if(p[0]==="api"&&p[1])k=p[1];else if(p[0]==="ws")k="websocket";(groups[k]||(groups[k]=[])).push(x)}document.getElementById("app").innerHTML=Object.entries(groups).map(([k,v])=>'<div class="group"><div class="name">'+esc(k)+'</div><div class="body">'+v.map(r=>'<div class="row"><div class="m" style="background:'+ (c[r.method]||"#6b7280") +'">'+esc(r.method)+'</div><div class="u">'+esc(r.url)+'</div></div>').join("")+'</div></div>').join("")||"No routes";}).catch(e=>document.getElementById("app").textContent=e.message||"Failed");</script></body></html>
