<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nest Explorer</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
:root {
  color-scheme: dark;
  --bg: #0f1117; --card: #1a1d27; --ink: #e4e7ef; --muted: #6b7280;
  --line: #2a2d3a; --accent: #6366f1; --ok: #22c55e; --warn: #eab308; --error: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font: 14px/1.5 system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--line); }
.header h1 { font-size: 18px; font-weight: 700; }
.convention-badge { display: flex; align-items: center; gap: 8px; padding: 5px 12px; background: var(--card); border: 1px solid var(--line); border-radius: 20px; cursor: pointer; font-size: 12px; color: var(--muted); position: relative; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.green { background: var(--ok); } .dot.yellow { background: var(--warn); } .dot.red { background: var(--error); }
.violations-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 8px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 12px; min-width: 300px; z-index: 10; }
.violations-dropdown.open { display: block; }
.violation { padding: 4px 0; border-bottom: 1px solid var(--line); font-size: 12px; }
.violation:last-child { border-bottom: 0; }

/* Ancestors zone */
.ancestors { border-bottom: 1px solid var(--line); }
.ancestor { display: flex; align-items: center; gap: 10px; padding: 7px 24px; cursor: pointer; font-size: 12px; color: var(--muted); transition: background .1s; }
.ancestor:hover { background: var(--card); }
.abar { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.aname { font-weight: 600; color: var(--ink); }
.ameta { color: var(--muted); font-size: 11px; }
.siblings { display: flex; gap: 3px; margin-left: auto; }
.sib-dot { width: 7px; height: 7px; border-radius: 50%; cursor: pointer; opacity: 0.5; transition: opacity .15s, transform .15s; }
.sib-dot:hover { opacity: 1; transform: scale(1.5); }

/* Focus zone */
.focus { flex: 1; padding: 20px 24px; max-width: 1100px; width: 100%; margin: 0 auto; }
.focus-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* Service grid */
.service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.service-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px 16px 16px 20px; cursor: pointer; border-left: 4px solid var(--muted); transition: background .12s; }
.service-card:hover { background: #1f2230; }
.service-card .sname { font-weight: 700; font-size: 14px; }
.service-card .srole { font-size: 12px; color: var(--muted); margin: 2px 0 8px; }
.service-card .scount { font-size: 11px; color: var(--muted); }

/* File list */
.file-list { display: flex; flex-direction: column; gap: 2px; }
.file-row { display: flex; align-items: center; gap: 12px; padding: 9px 14px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; cursor: pointer; transition: background .1s; }
.file-row:hover { background: #1f2230; }
.fname { font-weight: 600; min-width: 140px; flex-shrink: 0; font-size: 13px; }
.fdesc { color: var(--muted); font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fexports { display: flex; gap: 3px; flex-wrap: wrap; }
.badge { padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; background: #2a2d3a; color: var(--accent); }

/* File detail */
.file-detail h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; font-family: monospace; }
.file-detail .fdesc-full { color: var(--muted); margin-bottom: 16px; font-size: 12px; }
.file-detail section { margin-bottom: 20px; }
.file-detail section h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
th { text-align: left; padding: 6px 10px; font-size: 10px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--line); background: #15171f; }
td { padding: 6px 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
tr:last-child td { border-bottom: 0; }
.method-badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; color: #fff; }
.method-GET { background: var(--ok); } .method-POST { background: #3b82f6; }
.method-PUT, .method-PATCH { background: var(--warn); color: #000; } .method-DELETE { background: var(--error); }
.link-list { display: flex; flex-direction: column; gap: 3px; }
.link-list a { font-size: 12px; font-family: monospace; color: var(--accent); text-decoration: none; }
.link-list a:hover { text-decoration: underline; }
.commit-row { display: flex; gap: 10px; padding: 4px 0; font-size: 11px; }
.chash { font-family: monospace; color: var(--accent); min-width: 60px; }
.cdate { color: var(--muted); min-width: 80px; }

/* Below zone */
.below { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); opacity: 0.4; }
.below-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding: 0 4px; }
.below-item { padding: 3px 14px; font-size: 11px; display: flex; gap: 10px; align-items: baseline; }
.bname { font-weight: 600; min-width: 120px; flex-shrink: 0; }
.bchips { color: var(--muted); font-size: 10px; }
.bchip { display: inline; }
.bchip::after { content: ' · '; }
.bchip:last-child::after { content: ''; }
.bmore { color: var(--muted); font-style: italic; padding: 3px 14px; font-size: 10px; }

/* Live bar */
.live-bar { padding: 8px 24px; border-top: 1px solid var(--line); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; background: var(--card); }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

.error-box { padding: 16px; background: #1c1012; border: 1px solid var(--error); border-radius: 8px; color: var(--error); text-align: center; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>Nest Explorer</h1>
  <div class="convention-badge" id="conventionBadge" onclick="toggleViolations()">
    <div class="dot" id="conventionDot"></div>
    <span id="conventionLabel">...</span>
    <div class="violations-dropdown" id="violationsDropdown"></div>
  </div>
</div>

<div class="ancestors" id="ancestors"></div>

<div class="focus" id="focus">
  <p style="color:var(--muted)">Loading...</p>
</div>

<div class="live-bar">
  <div class="pulse"></div>
  <span id="stateText">Connecting...</span>
</div>

<script>
const TOKEN = localStorage.getItem('nest_token');
if (!TOKEN) location.href = '/login';

const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const SVC_COLORS = { hub:'#6366f1', client:'#eab308', agent:'#22c55e', scripts:'#6b7280', docs:'#f97316', meta:'#94a3b8', openclaw:'#ec4899' };

// Trail: [{type, path, label, serviceId, data, siblings}]
const trail = [];

async function api(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + TOKEN } });
  if (r.status === 401) { localStorage.removeItem('nest_token'); location.href = '/login'; }
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Navigation ──────────────────────────────────────

async function goServices() {
  const data = await api('/api/nest/services');
  const services = data.services || [];
  trail.length = 0;
  trail.push({ type: 'services', label: 'Nest', data: services, siblings: [] });
  render();
}

async function goFolder(path, label, serviceId, siblings) {
  let url = '/api/nest/folder?path=' + encodeURIComponent(path);
  if (serviceId) url += '&service=' + encodeURIComponent(serviceId);
  const data = await api(url);
  const dirs = (data.directories || []).map(d => ({ ...d, isDir: true, name: d.name || d.path?.split('/').pop() }));
  const files = [...dirs, ...(data.files || [])];
  trail.push({ type: 'folder', path, label: label || path.split('/').pop() || path, serviceId, data: files, siblings: siblings || [] });
  render();
  fetchBelow(files, path);
}

async function goFile(path, siblings) {
  const data = await api('/api/nest/file?path=' + encodeURIComponent(path));
  trail.push({ type: 'file', path, label: path.split('/').pop(), data, siblings: siblings || [] });
  render();
}

function jumpTo(index) {
  trail.length = index + 1;
  render();
  // Re-fetch below if focus is a folder
  const cur = trail[trail.length - 1];
  if (cur.type === 'folder') fetchBelow(cur.data, cur.path);
}

async function jumpSibling(trailIndex, sibPath, sibLabel, sibServiceId) {
  trail.length = trailIndex; // truncate to parent
  if (trailIndex === 0) {
    // Jumping to a sibling service from root
    await goFolder(sibPath, sibLabel, sibServiceId,
      trail[0]?.data?.filter(s => s.root !== sibPath).map(s => ({ path: s.root, label: s.name, id: s.id, color: SVC_COLORS[s.id] || '#6b7280' })) || []);
  } else {
    const parent = trail[trailIndex - 1];
    const siblings = (parent?.data || []).filter(f => f.path !== sibPath);
    if (sibPath.endsWith('/') || !sibPath.includes('.')) {
      await goFolder(sibPath, sibLabel, sibServiceId, siblings);
    } else {
      await goFile(sibPath, siblings);
    }
  }
}

// ── Render ──────────────────────────────────────────

function render() {
  renderAncestors();
  renderFocus();
}

function renderAncestors() {
  const el = document.getElementById('ancestors');
  if (trail.length <= 1) { el.innerHTML = ''; return; }

  let html = '';
  for (let i = 0; i < trail.length - 1; i++) {
    const t = trail[i];
    const indent = i * 16;
    const color = t.serviceId ? (SVC_COLORS[t.serviceId] || '#6b7280') : '#6b7280';
    const meta = t.type === 'services'
      ? `${(t.data || []).length} services`
      : `${(t.data || []).length} items`;
    const sibs = (trail[i + 1]?.siblings || []);

    html += `<div class="ancestor" style="padding-left:${24 + indent}px" onclick="jumpTo(${i})">
      <div class="abar" style="background:${color}"></div>
      <span class="aname">${esc(t.label)}</span>
      <span class="ameta">${esc(meta)}</span>
      <span class="siblings">${sibs.map(s =>
        `<span class="sib-dot" style="background:${s.color || '#6b7280'}"
          title="${esc(s.label)}"
          onclick="event.stopPropagation();jumpSibling(${i + 1},'${esc(s.path)}','${esc(s.label)}','${esc(s.id || '')}')"></span>`
      ).join('')}</span>
    </div>`;
  }
  el.innerHTML = html;
}

function renderFocus() {
  const el = document.getElementById('focus');
  const cur = trail[trail.length - 1];
  if (!cur) { el.innerHTML = ''; return; }

  if (cur.type === 'services') {
    el.innerHTML = `<div class="service-grid">${(cur.data || []).map(s => {
      const color = SVC_COLORS[s.id] || '#6b7280';
      return `<div class="service-card" style="border-left-color:${color}" data-root="${esc(s.root)}" data-id="${esc(s.id)}" data-label="${esc(s.name)}">
        <div class="sname">${esc(s.name)}</div>
        <div class="srole">${esc(s.role)}</div>
      </div>`;
    }).join('')}</div>`;
    return;
  }

  if (cur.type === 'folder') {
    const items = cur.data || [];
    el.innerHTML = `<div class="focus-title">${esc(cur.label)}</div>
    <div class="file-list">${items.map(f => {
      const name = f.name || f.path?.split('/').pop() || '';
      const fpath = f.path || '';
      const isDir = f.isDir;
      return `<div class="file-row" data-path="${esc(fpath)}" data-dir="${!!isDir}" data-name="${esc(name)}">
        <div class="fname">${isDir ? '📁 ' : ''}${esc(name)}</div>
        <div class="fdesc">${esc(f.header || '')}</div>
        <div class="fexports">${(f.exports || []).slice(0, 4).map(e => `<span class="badge">${esc(e)}</span>`).join('')}</div>
      </div>`;
    }).join('')}</div>
    <div class="below" id="below"></div>`;
    return;
  }

  if (cur.type === 'file') {
    const d = cur.data;
    const fns = d.functions || [];
    const routes = d.routes || [];
    const imports = d.imports || [];
    const importedBy = d.importedBy || [];
    const commits = d.commits || d.history || [];

    let html = `<div class="file-detail">
      <h2>${esc(cur.path)}</h2>
      <p class="fdesc-full">${esc(d.description || d.header || '')}</p>`;

    if (fns.length) {
      html += `<section><h3>Functions</h3><table>
        <tr><th>Name</th><th>Params</th><th>Summary</th></tr>
        ${fns.map(f => `<tr>
          <td><strong>${esc(f.name)}</strong></td>
          <td style="font-family:monospace;font-size:11px;color:var(--muted)">${esc(typeof f.params === 'string' ? f.params : (f.params||[]).join(', '))}</td>
          <td style="color:var(--muted)">${esc(f.summary || f.description || '')}</td>
        </tr>`).join('')}</table></section>`;
    }

    if (routes.length) {
      html += `<section><h3>Routes</h3><table>
        <tr><th>Method</th><th>Path</th></tr>
        ${routes.map(r => `<tr>
          <td><span class="method-badge method-${esc(r.method)}">${esc(r.method)}</span></td>
          <td style="font-family:monospace;font-size:12px">${esc(r.path || r.url)}</td>
        </tr>`).join('')}</table></section>`;
    }

    if (imports.length) {
      html += `<section><h3>Imports</h3><div class="link-list">
        ${imports.map(i => { const p = typeof i === 'string' ? i : i.path || i.module;
          return `<a href="#" onclick="event.preventDefault();trail.length=${trail.length};goFile('${esc(p)}')">${esc(p)}</a>`; }).join('')}
      </div></section>`;
    }

    if (importedBy.length) {
      html += `<section><h3>Imported By</h3><div class="link-list">
        ${importedBy.map(i => { const p = typeof i === 'string' ? i : i.path || i.module;
          return `<a href="#" onclick="event.preventDefault();trail.length=${trail.length};goFile('${esc(p)}')">${esc(p)}</a>`; }).join('')}
      </div></section>`;
    }

    if (commits.length) {
      html += `<section><h3>Git History</h3>
        ${commits.slice(0, 5).map(c => `<div class="commit-row">
          <span class="chash">${esc((c.hash||'').slice(0,7))}</span>
          <span class="cdate">${esc(c.date||'')}</span>
          <span>${esc(c.message||'')}</span>
        </div>`).join('')}</section>`;
    }

    html += '</div>';
    el.innerHTML = html;
  }
}

// ── Below zone (lazy) ───────────────────────────────

async function fetchBelow(items, parentPath) {
  const belowEl = document.getElementById('below');
  if (!belowEl || !items.length) return;

  let html = '<div class="below-title">Contains</div>';
  const dirs = items.filter(f => f.isDir);
  const files = items.filter(f => !f.isDir);

  // Files: show exports (already have them)
  for (const f of files) {
    const name = f.name || f.path?.split('/').pop() || '';
    const exports = f.exports || [];
    if (!exports.length) continue;
    html += `<div class="below-item">
      <span class="bname">${esc(name)}</span>
      <span class="bchips">${exports.slice(0, 6).map(e => `<span class="bchip">${esc(e)}</span>`).join('')}${exports.length > 6 ? ' ...' : ''}</span>
    </div>`;
  }

  // Dirs: fetch contents (cap at 5)
  const dirsToFetch = dirs.slice(0, 5);
  const remaining = dirs.length - dirsToFetch.length;

  const results = await Promise.all(dirsToFetch.map(async d => {
    try {
      const data = await api('/api/nest/folder?path=' + encodeURIComponent(d.path));
      const children = [...(data.directories || []), ...(data.files || [])];
      return { name: d.name, children };
    } catch { return { name: d.name, children: [] }; }
  }));

  for (const r of results) {
    const names = r.children.slice(0, 8).map(c => c.name || c.path?.split('/').pop() || '');
    html += `<div class="below-item">
      <span class="bname">📁 ${esc(r.name)}</span>
      <span class="bchips">${names.map(n => `<span class="bchip">${esc(n)}</span>`).join('')}${r.children.length > 8 ? ' ...' : ''}</span>
    </div>`;
  }

  if (remaining > 0) {
    html += `<div class="bmore">+ ${remaining} more folders</div>`;
  }

  belowEl.innerHTML = html;
}

// ── Event delegation ────────────────────────────────

document.getElementById('focus').addEventListener('click', e => {
  const card = e.target.closest('.service-card');
  if (card) {
    const services = trail[trail.length - 1]?.data || [];
    const siblings = services.filter(s => s.id !== card.dataset.id).map(s => ({
      path: s.root, label: s.name, id: s.id, color: SVC_COLORS[s.id] || '#6b7280'
    }));
    goFolder(card.dataset.root, card.dataset.label, card.dataset.id, siblings);
    return;
  }
  const row = e.target.closest('.file-row');
  if (row) {
    const items = trail[trail.length - 1]?.data || [];
    const siblings = items.filter(f => f.path !== row.dataset.path).map(f => ({
      path: f.path, label: f.name || f.path?.split('/').pop(), color: '#6b7280'
    }));
    if (row.dataset.dir === 'true') goFolder(row.dataset.path, row.dataset.name, null, siblings);
    else goFile(row.dataset.path, siblings);
  }
});

// ── Convention health ───────────────────────────────

async function loadConventions() {
  try {
    const data = await api('/api/nest/health/conventions');
    const v = data.violations || data.failures || [];
    const dot = document.getElementById('conventionDot');
    const label = document.getElementById('conventionLabel');
    if (!v.length) { dot.className = 'dot green'; label.textContent = 'All conventions pass'; }
    else if (v.length <= 3) { dot.className = 'dot yellow'; label.textContent = v.length + ' violation' + (v.length > 1 ? 's' : ''); }
    else { dot.className = 'dot red'; label.textContent = v.length + ' violations'; }
    const dd = document.getElementById('violationsDropdown');
    dd.innerHTML = v.length
      ? v.map(x => `<div class="violation">${esc(x.rule || x.message || x)}${x.path ? `<br><span style="color:var(--muted);font-family:monospace;font-size:10px">${esc(x.path)}</span>` : ''}</div>`).join('')
      : '<div class="violation" style="color:var(--ok)">All passing.</div>';
  } catch {
    document.getElementById('conventionDot').className = 'dot';
    document.getElementById('conventionLabel').textContent = '?';
  }
}
function toggleViolations() { document.getElementById('violationsDropdown').classList.toggle('open'); }
document.addEventListener('click', e => { if (!document.getElementById('conventionBadge').contains(e.target)) document.getElementById('violationsDropdown').classList.remove('open'); });

// ── Live state ──────────────────────────────────────

async function loadState() {
  try {
    const d = await api('/api/nest/state');
    const hub = d.hub || {};
    const agents = d.agents?.connected ?? d.agents ?? 0;
    const p = [];
    p.push(agents + ' agent' + (agents !== 1 ? 's' : ''));
    const up = hub.uptime_seconds || hub.uptime || 0;
    if (up) { const m = Math.floor(up/60); p.push('uptime ' + (m >= 60 ? Math.floor(m/60)+'h' : m+'m')); }
    if (hub.routeCount) p.push(hub.routeCount + ' routes');
    document.getElementById('stateText').textContent = p.join(' · ');
  } catch { document.getElementById('stateText').textContent = '—'; }
}

// ── Init ────────────────────────────────────────────

(async () => {
  await Promise.all([goServices(), loadState(), loadConventions()]);
  setInterval(loadState, 30000);
})();
</script>
</body>
</html>
