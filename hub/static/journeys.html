<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nest — Brood</title><link rel="manifest" href="/manifest.webmanifest"><style>body{margin:0;background:#e9dfcf;color:#17231d;font:14px/1.45 system-ui,sans-serif}.page{max-width:960px;margin:0 auto;padding:16px}.hero,.card{background:#f7f1e4;border:1px solid #d4c7b1;border-radius:18px;padding:16px}.hero{background:#1b3128;color:#fff;border:none}.muted{color:#667067}.mode{display:flex;gap:8px;margin:12px 0}.mode button{flex:1;border:1px solid #d4c7b1;border-radius:999px;padding:10px;background:#efe4d1;cursor:pointer;font:inherit;font-weight:800}.mode button.active{background:#101814;color:#fff;border-color:#101814}.stack{display:grid;gap:10px}.line{font-family:ui-monospace,monospace;white-space:pre-wrap}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:#efe5d2;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700}.runtime{display:grid;gap:8px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px;border-bottom:1px solid #eee}.row:last-child{border-bottom:0}</style></head><body><div class="page"><div class="hero"><div style="font-size:12px;letter-spacing:1px;color:#cfb897;font-weight:800">🪺 MYTH</div><div style="font-size:30px;font-weight:900">Brood</div><div style="color:#d7ddd8">The Nest is warming. One shell becomes many.</div></div><div class="card line" style="margin-top:12px">🪺 Myth → 🛤️ Arc → 🐣 Journey → 📡 Runtime</div><div class="card" style="margin-top:12px"><div style="font-weight:800;margin-bottom:8px">🌒 Season</div><div class="chips"><span class="chip">🌑 Dormant</span><span class="chip">🌘 Warming</span><span class="chip">🌒 Quickening</span><span class="chip">🐣 Hatching</span><span class="chip">🐥 Flocking</span></div></div><div class="mode"><button id="m-arcs" class="active">🛤️ Arcs</button><button id="m-journeys">🐣 Journeys</button><button id="m-runtime">📡 Runtime</button></div><div id="app"></div></div><script>const t=localStorage.getItem("nest_token");if(!t)location.href="/login";const app=document.getElementById("app");const arcs=[["🌅","Awaken","Hatch → Breath → Song","A host becomes reachable, authenticated, and awake."],["🐥","Spawn","Hatch → Breath → Song","A new host joins without rediscovering the ritual."],["🩹","Recover","Breath → Song","The Nest speaks again without starting from nothing."]];const journeys=[["🐣 Hatch",["clone repo","shape config.env","bootstrap host"]],["🫁 Breath",["claude login","codex login","resolve setup"]],["🎶 Song",["start hub","attach agent","verify signals"]]];function setMode(m){document.querySelectorAll(".mode button").forEach(b=>b.classList.toggle("active",b.id==="m-"+m));if(m==="arcs")app.innerHTML='<div class="stack">'+arcs.map(a=>'<div class="card"><div style="font-size:20px;font-weight:800">'+a[0]+' '+a[1]+'</div><div class="muted" style="margin-top:4px">'+a[2]+'</div><div style="margin-top:10px">'+a[3]+'</div></div>').join("")+'</div>';if(m==="journeys")app.innerHTML='<div class="stack">'+journeys.map(j=>'<div class="card"><div style="font-size:20px;font-weight:800">'+j[0]+'</div><div class="chips" style="margin-top:10px">'+j[1].map(x=>'<span class="chip">'+x+'</span>').join("")+'</div></div>').join("")+'</div>';if(m==="runtime")loadRuntime()}async function api(p){const r=await fetch("/api"+p,{headers:{Authorization:"Bearer "+t}});if(r.status===401){localStorage.removeItem("nest_token");location.href="/login";throw new Error("Unauthorized")}const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||d.detail||("API error "+r.status));return d}async function loadRuntime(){app.innerHTML='<div class="card">Loading…</div>';try{const [health,servers,setup,claude,codex]=await Promise.allSettled([api("/health"),api("/servers"),api("/setup/status"),api("/tokens/limits"),api("/tokens/codex/status")]);let metrics=null,serverList=servers.status==="fulfilled"?servers.value.servers||[]:[];if(serverList[0]){try{metrics=(await api("/servers/"+serverList[0].id)).metrics}catch{}}const rows=[["🐚 Servers",serverList.filter(s=>s.status==="running").length+" running",serverList.length+" total"],["💽 Disk",metrics?.disk?.percent!=null?Math.round(metrics.disk.percent)+"% used":"unknown",metrics?.disk?metrics.disk.used_gb+"GB / "+metrics.disk.total_gb+"GB":""],["🗣️ Hub",health.status==="fulfilled"&&health.value.status==="ok"?"healthy":"down",health.status==="fulfilled"?"uptime "+Math.floor(health.value.uptime)+"s":""],["⚡ Agent",metrics?"connected":"missing",metrics?"up "+Math.floor(metrics.uptime_seconds/3600)+"h":""],["🌙 Claude",claude.status==="fulfilled"?(claude.value.status||"unknown"):"unknown",claude.status==="fulfilled"?(claude.value.session?.utilization_pct||0)+"% session":""],["✋ Codex",codex.status==="fulfilled"?(codex.value.token_expired?"expired":"valid"):"unknown",codex.status==="fulfilled"?(codex.value.plan||""):""],["🔐 Setup",setup.status==="fulfilled"?(setup.value.needsSetup?"incomplete":"complete"):"unknown",""]];app.innerHTML='<div class="card line">         🪺 BROOD\n      season: '+(serverList.length===0?'Dormant':!metrics?'Quickening':serverList.length>1?'Flocking':'Hatching')+'</div><div class="card" style="margin-top:10px"><div class="runtime">'+rows.map(r=>'<div class="row"><div><div style="font-weight:800">'+r[0]+'</div>'+(r[2]?'<div class="muted" style="font-size:12px">'+r[2]+'</div>':'')+'</div><div style="font-weight:900">'+r[1]+'</div></div>').join("")+'</div></div>'}catch(e){app.innerHTML='<div class="card">'+(e.message||"Failed")+'</div>'}}document.getElementById("m-arcs").onclick=()=>setMode("arcs");document.getElementById("m-journeys").onclick=()=>setMode("journeys");document.getElementById("m-runtime").onclick=()=>setMode("runtime");setMode("arcs");</script></body></html>
