<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nest — OpenClaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f5f5; color: #333;
  height: 100vh; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* Nav */
.nav { display: flex; gap: 0; background: #1a1a2e; padding: 0 8px; flex-shrink: 0; }
.nav a {
  color: #8b8fa3; text-decoration: none; font-size: 12px; font-weight: 600;
  padding: 10px 14px; letter-spacing: 0.4px;
}
.nav a:hover { color: #d7d9e0; }
.nav a.active { color: #fff; border-bottom: 2px solid #7eb8ff; }

/* Chat area */
.messages { flex: 1; overflow-y: auto; padding: 16px; max-width: 720px; width: 100%; margin: 0 auto; }

/* Hero */
.hero {
  background: #1a1a2e; border-radius: 18px; padding: 18px; margin-bottom: 16px;
}
.hero-title { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.hero-text { color: #d7d9e0; font-size: 14px; line-height: 20px; margin-bottom: 14px; }
.mono { font-family: monospace; color: #7eb8ff; }
.action-row { display: flex; flex-wrap: wrap; gap: 8px; }
.action-chip {
  background: #2f3557; color: #fff; border: none; padding: 9px 12px;
  border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer;
}
.action-chip:hover { background: #3d4570; }
.action-chip:active { opacity: 0.8; }

/* Error */
.error-box {
  background: #fee2e2; border-radius: 12px; padding: 12px; margin-bottom: 12px;
}
.error-text { color: #b91c1c; font-size: 13px; }

/* Empty state */
.empty { text-align: center; margin-top: 36px; margin-bottom: 12px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 19px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.empty-text { font-size: 14px; color: #777; }

/* Bubbles */
.bubble { max-width: 86%; padding: 12px; border-radius: 16px; margin-bottom: 8px; white-space: pre-wrap; word-wrap: break-word; }
.bubble-user { margin-left: auto; background: #1a1a2e; color: #fff; font-size: 14px; line-height: 20px; }
.bubble-assistant { margin-right: auto; background: #fff; color: #333; font-size: 14px; line-height: 20px; }
.bubble-thinking { margin-right: auto; background: #fff; padding: 12px; }

/* Input bar */
.input-bar {
  display: flex; gap: 8px; padding: 12px; background: #fff;
  border-top: 1px solid #e0e0e0; flex-shrink: 0;
  max-width: 720px; width: 100%; margin: 0 auto;
}
.text-input {
  flex: 1; background: #f5f5f5; border: none; border-radius: 20px;
  padding: 10px 16px; font-size: 15px; color: #333; outline: none;
  font-family: inherit;
}
.text-input::placeholder { color: #999; }
.send-btn {
  width: 40px; height: 40px; border-radius: 20px; background: #1a1a2e;
  border: none; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.send-btn:disabled { opacity: 0.4; cursor: default; }
.send-btn:active:not(:disabled) { opacity: 0.8; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 18px; height: 18px; border: 2px solid #e0e0e0;
  border-top-color: #999; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/tokens">Tokens</a>
  <a href="/claw" class="active">Claw</a>
  <a href="/html/scripts.html">Scripts</a>
</nav>

<div class="messages" id="messages"></div>

<div style="background:#fff; border-top: 1px solid #e0e0e0;">
  <div class="input-bar">
    <input class="text-input" id="input" placeholder="Ask OpenClaw something..." autocomplete="off">
    <button class="send-btn" id="sendBtn" disabled>&uarr;</button>
  </div>
</div>

<script>
// ── Auth ──
const TOKEN = localStorage.getItem('nest_token');
if (!TOKEN) location.href = '/login';

// ── API ──
async function api(path, opts) {
  const res = await fetch('/api' + path, Object.assign({
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' }
  }, opts));
  if (res.status === 401) { location.href = '/login'; return null; }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || body.detail || 'API error ' + res.status);
  }
  return res.json();
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── State ──
let messages = [];
let sending = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

const QUICK_ACTIONS = [
  'help',
  'summarize the current Nest state',
  'which server looks overloaded right now?',
  '/apply add a visible help panel to this screen',
];

// ── Render ──
function render() {
  let html = '';

  // Hero
  html += '<div class="hero"><div class="hero-title">OpenClaw</div>' +
    '<div class="hero-text">Read-only by default. Prefix with <span class="mono">/apply</span> to let Codex edit <span class="mono">/opt/nest</span>.</div>' +
    '<div class="action-row">';
  for (const action of QUICK_ACTIONS) {
    html += '<button class="action-chip" data-action="' + esc(action) + '">' + esc(action) + '</button>';
  }
  html += '</div></div>';

  // Error
  if (window._chatError) {
    html += '<div class="error-box"><div class="error-text">' + esc(window._chatError) + '</div></div>';
  }

  // Empty state
  if (messages.length === 0 && !sending) {
    html += '<div class="empty"><div class="empty-icon">&#x1FAba;</div>' +
      '<div class="empty-title">Start with a button or type below</div>' +
      '<div class="empty-text">Useful first moves: help, status summary, or an /apply request.</div></div>';
  }

  // Messages
  for (const msg of messages) {
    if (msg.role === 'user') {
      html += '<div class="bubble bubble-user">' + esc(msg.content) + '</div>';
    } else {
      html += '<div class="bubble bubble-assistant">' + esc(msg.content) + '</div>';
    }
  }

  // Thinking indicator
  if (sending) {
    html += '<div class="bubble-thinking"><div class="spinner"></div></div>';
  }

  messagesEl.innerHTML = html;
  messagesEl.scrollTop = messagesEl.scrollHeight;

  // Bind quick action buttons
  for (const btn of messagesEl.querySelectorAll('.action-chip')) {
    btn.addEventListener('click', function() { send(this.dataset.action); });
  }

  // Update send button
  sendBtn.disabled = !inputEl.value.trim() || sending;
}

// ── Send ──
async function send(raw) {
  const text = (raw || inputEl.value).trim();
  if (!text || sending) return;
  inputEl.value = '';
  sending = true;
  window._chatError = '';
  render();

  try {
    const data = await api('/chat/send', {
      method: 'POST',
      body: JSON.stringify({ message: text }),
    });
    if (data) {
      messages.push(data.userMessage, data.assistantMessage);
    }
  } catch (err) {
    window._chatError = err.message || 'OpenClaw request failed';
    if (!raw) inputEl.value = text;
  } finally {
    sending = false;
    render();
  }
}

// ── Input handling ──
inputEl.addEventListener('input', function() {
  sendBtn.disabled = !this.value.trim() || sending;
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', function() { send(); });

// ── Load history ──
async function loadHistory() {
  try {
    const data = await api('/chat/history');
    if (data && data.messages) messages = data.messages;
  } catch (err) {
    window._chatError = err.message || 'Failed to load OpenClaw history';
  }
  render();
  inputEl.focus();
}

loadHistory();
</script>
</body>
</html>
