<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Nest — Login</title>
<style>
:root {
  --bg: #161a28;
  --bg-2: #27324a;
  --card: #ffffff;
  --ink: #161a28;
  --muted: #6b7280;
  --line: #d7dce5;
  --accent: #1a1a2e;
  --accent-2: #2563eb;
  --error: #b91c1c;
  --ok: #166534;
}
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, var(--bg-2) 0%, var(--bg) 58%);
  color: var(--ink);
  font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 24px;
}
.card {
  width: 100%;
  max-width: 440px;
  background: var(--card);
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
}
.mark {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  color: #7a8497;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
h1 {
  margin: 0 0 6px;
  font-size: 34px;
  text-align: center;
}
.subtitle {
  margin: 0 0 18px;
  color: var(--muted);
  text-align: center;
}
input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 10px;
  font: inherit;
  margin-bottom: 12px;
  outline: none;
}
input:focus {
  border-color: var(--accent-2);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}
.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
button {
  border: 0;
  border-radius: 10px;
  padding: 12px 14px;
  font: inherit;
  cursor: pointer;
}
.ghost {
  background: #eef2f7;
  color: var(--ink);
}
.primary {
  width: 100%;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  margin-top: 4px;
}
.primary[disabled], .ghost[disabled] {
  opacity: 0.55;
  cursor: default;
}
.status {
  min-height: 22px;
  margin: 8px 0 0;
  font-size: 14px;
  text-align: center;
}
.status.error { color: var(--error); }
.status.ok { color: var(--ok); }
.hint {
  margin-top: 14px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
code {
  display: inline-block;
  background: #f2f4f8;
  padding: 1px 6px;
  border-radius: 6px;
  font-size: 13px;
}
</style>
</head>
<body>
  <main class="card">
    <div class="mark">🪺 Nest</div>
    <h1>Sign In</h1>
    <p class="subtitle">Use your admin password to enter the Nest.</p>

    <input id="name" type="text" placeholder="Name" autofocus>
    <input id="password" type="password" placeholder="Password">

    <div class="row">
      <button class="ghost" id="toggle">Show password</button>
      <button class="ghost" id="check">Check server</button>
    </div>

    <button class="primary" id="submit">Sign in</button>
    <div class="status" id="status"></div>

    <div class="hint">
      Default admin name is <code>Admin</code>. Password was set during onboarding.
    </div>
  </main>
<script>
const nameInput = document.getElementById("name");
const password = document.getElementById("password");
const statusEl = document.getElementById("status");
const toggleBtn = document.getElementById("toggle");
const checkBtn = document.getElementById("check");
const submitBtn = document.getElementById("submit");

if (localStorage.getItem("nest_token")) {
  fetch("/api/auth/me", { headers: { Authorization: "Bearer " + localStorage.getItem("nest_token") } })
    .then((res) => { if (res.ok) location.href = "/"; })
    .catch(() => {});
}

function setStatus(text, cls) {
  statusEl.textContent = text || "";
  statusEl.className = "status" + (cls ? " " + cls : "");
}

async function handleLogin() {
  const value = password.value.trim();
  if (!value) {
    setStatus("Enter your admin password.", "error");
    return;
  }

  submitBtn.disabled = true;
  setStatus("Signing in...", "");
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: nameInput.value.trim(), password: value }),
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || body.detail || "Login failed");
    localStorage.setItem("nest_token", body.token);
    location.href = "/";
  } catch (error) {
    setStatus(error.message || "Login failed", "error");
    submitBtn.disabled = false;
  }
}

async function handleCheck() {
  checkBtn.disabled = true;
  setStatus("", "");
  try {
    const res = await fetch("/api/health");
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || body.detail || "Server check failed");
    setStatus("Server reachable. Version " + (body.version || "unknown") + ".", "ok");
  } catch (error) {
    setStatus(error.message || "Server check failed", "error");
  } finally {
    checkBtn.disabled = false;
  }
}

toggleBtn.addEventListener("click", () => {
  const hidden = password.type === "password";
  password.type = hidden ? "text" : "password";
  toggleBtn.textContent = hidden ? "Hide password" : "Show password";
});
checkBtn.addEventListener("click", handleCheck);
submitBtn.addEventListener("click", handleLogin);
password.addEventListener("keydown", (event) => {
  if (event.key === "Enter") handleLogin();
});
</script>
</body>
</html>
