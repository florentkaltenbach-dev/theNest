<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon-192.png" sizes="192x192">
<title>Nest</title>
<style>
:root { --bg: #161a28; --bg-2: #27324a; --card: #fff; --ink: #161a28; --line: #d7dce5; --accent: #1a1a2e; --accent-2: #2563eb; --error: #b91c1c; }
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, var(--bg-2) 0%, var(--bg) 58%); font: 16px/1.45 system-ui, sans-serif; padding: 24px; }
.card { width: 100%; max-width: 380px; background: var(--card); border-radius: 18px; padding: 28px; box-shadow: 0 30px 80px rgba(0,0,0,.35); }
.mark { color: #7a8497; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; }
input { width: 100%; padding: 14px 16px; border: 1px solid var(--line); border-radius: 10px; font: inherit; margin-bottom: 12px; outline: none; }
input:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
button { width: 100%; border: 0; border-radius: 10px; padding: 14px; font: inherit; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; }
button[disabled] { opacity: .55; cursor: default; }
.status { min-height: 20px; margin: 10px 0 0; font-size: 13px; text-align: center; }
.error { color: var(--error); }
</style>
</head>
<body>
<main class="card">
  <div class="mark">Nest</div>
  <input id="name" type="text" placeholder="Name" autofocus>
  <input id="password" type="password" placeholder="Password">
  <button id="go">Sign in</button>
  <div class="status" id="st"></div>
</main>
<script>
const n=document.getElementById("name"),p=document.getElementById("password"),st=document.getElementById("st"),btn=document.getElementById("go");
if(localStorage.getItem("nest_token"))fetch("/api/auth/me",{headers:{Authorization:"Bearer "+localStorage.getItem("nest_token")}}).then(r=>{if(r.ok)location.href="/"}).catch(()=>{});
async function login(){const name=n.value.trim(),pw=p.value.trim();if(!name||!pw){st.textContent="Enter name and password.";st.className="status error";return}btn.disabled=true;st.textContent="";try{const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,password:pw})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Login failed");localStorage.setItem("nest_token",d.token);location.href="/"}catch(e){st.textContent=e.message;st.className="status error";btn.disabled=false}}
btn.onclick=login;p.onkeydown=n.onkeydown=e=>{if(e.key==="Enter")login()};
</script>
</body>
</html>
