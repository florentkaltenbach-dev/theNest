<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nest — Council</title>
<link rel="manifest" href="/manifest.webmanifest">
<style>
  :root {
    --bg: #f6f5f1; --ink: #181c1f; --muted: #667076; --line: #ddd8cf;
    --panel: #fffdfa; --accent: #285f9f; --med-bg: #eef1f7; --med-line: #c7d2e8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .page { max-width: 820px; margin: 0 auto; padding: 18px; }
  .hero { background: #172026; color: #f8f6ef; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .eyebrow { color: #d2aa61; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  h1 { margin: 6px 0 4px; font-size: clamp(26px, 5vw, 40px); line-height: 1; }
  .lead { color: #d7ddd9; font-size: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
  button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--line); background: #efe9dd; padding: 8px 12px; font-weight: 700; }
  button:hover { background: #e6dfd0; }
  button:disabled { opacity: .5; cursor: default; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  input, textarea { font: inherit; width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff; color: var(--ink); }
  textarea { resize: vertical; min-height: 46px; }
  .row { display: flex; gap: 8px; }
  .muted { color: var(--muted); }
  .topic { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); margin-bottom: 8px; cursor: pointer; }
  .topic:hover { border-color: var(--accent); }
  .topic .t { font-weight: 800; }
  .topic .meta { font-size: 12px; color: var(--muted); }
  .thread { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
  .msg { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: var(--panel); }
  .msg.mediator { background: var(--med-bg); border-color: var(--med-line); }
  .msg .head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .msg .author { font-weight: 800; }
  .msg .time { font-size: 11px; color: var(--muted); margin-left: auto; }
  .msg .text { white-space: pre-wrap; word-break: break-word; }
  .badge { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 800; background: var(--accent); color: #fff; }
  .invokebar { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 10px; }
  .thinking { font-style: italic; color: var(--med-line); }
  .composer { display: flex; gap: 8px; align-items: flex-end; }
  .composer textarea { flex: 1; }
  .back { background: none; border: none; padding: 0; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
  .err { color: #b33b2e; font-size: 13px; margin: 6px 0; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
<script src="/sidebar.js"></script>
</head>
<body>
<main class="page">
  <div class="hero">
    <div class="eyebrow">Interact</div>
    <h1>Council</h1>
    <p class="lead">A shared room. The four of us talk; Claude mediates only when invited — it never takes a side.</p>
  </div>
  <div id="app"></div>
</main>
<script>
const token = localStorage.getItem("nest_token");
if (!token) location.href = "/login";

const app = document.getElementById("app");
let view = { name: "list" };     // {name:"list"} | {name:"thread", topic}
let lastTs = 0;                  // newest ts rendered in the current thread
let pollTimer = null;
let invoking = false;

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
}
function fmtTime(ts) { try { return new Date(ts).toLocaleString(); } catch { return ""; } }

async function api(path, opts = {}) {
  const r = await fetch("/api" + path, {
    ...opts,
    headers: { Authorization: "Bearer " + token, "content-type": "application/json", ...(opts.headers || {}) },
  });
  if (r.status === 401) { localStorage.removeItem("nest_token"); location.href = "/login"; throw new Error("Unauthorized"); }
  const d = await r.json().catch(() => ({}));
  if (!r.ok) { const e = new Error(d.error || ("API error " + r.status)); e.status = r.status; throw e; }
  return d;
}

// ── Topic list ──────────────────────────────────────────
async function showList() {
  stopPoll();
  view = { name: "list" };
  app.innerHTML = '<div class="card muted">Loading topics…</div>';
  let topics = [];
  try { topics = (await api("/council/topics")).topics || []; }
  catch (e) { app.innerHTML = '<div class="err">' + esc(e.message) + '</div>'; return; }

  const items = topics.map(t =>
    '<div class="topic" data-id="' + esc(t.id) + '">' +
      '<div><div class="t">' + esc(t.title) + '</div>' +
      '<div class="meta">by ' + esc(t.createdBy) + ' · ' + fmtTime(t.createdAt) + '</div></div>' +
      '<div class="muted">→</div>' +
    '</div>').join("");

  app.innerHTML =
    (items || '<div class="card muted">No topics yet. Start one below.</div>') +
    '<div class="card" style="margin-top:14px">' +
      '<div style="font-weight:800;margin-bottom:8px">New topic</div>' +
      '<div class="row"><input id="newTitle" placeholder="Topic title" maxlength="200">' +
      '<button class="primary" id="newBtn">Create</button></div>' +
      '<div class="err" id="newErr"></div>' +
    '</div>';

  app.querySelectorAll(".topic").forEach(el =>
    el.onclick = () => { const id = el.dataset.id; openThread(topics.find(t => t.id === id)); });
  const title = document.getElementById("newTitle");
  document.getElementById("newBtn").onclick = async () => {
    const v = title.value.trim();
    if (!v) return;
    try { const { topic } = await api("/council/topics", { method: "POST", body: JSON.stringify({ title: v }) }); openThread(topic); }
    catch (e) { document.getElementById("newErr").textContent = e.message; }
  };
  title.onkeydown = (e) => { if (e.key === "Enter") document.getElementById("newBtn").click(); };
}

// ── Thread view ─────────────────────────────────────────
function openThread(topic) {
  if (!topic) return showList();
  view = { name: "thread", topic };
  lastTs = 0;
  app.innerHTML =
    '<button class="back" id="back">← All topics</button>' +
    '<div class="card"><div style="font-weight:800;font-size:16px">' + esc(topic.title) + '</div>' +
    '<div class="meta muted" style="font-size:12px">by ' + esc(topic.createdBy) + '</div></div>' +
    '<div class="invokebar" id="invokebar">' +
      '<button data-focus="summarize">Summarize positions</button>' +
      '<button data-focus="disagreements">Where do we disagree?</button>' +
      '<button data-focus="next-step">Propose next step</button>' +
    '</div>' +
    '<div class="err" id="threadErr"></div>' +
    '<div class="thread" id="thread"></div>' +
    '<div class="composer">' +
      '<textarea id="composer" placeholder="Message the room… (mention @claude to invoke the mediator)"></textarea>' +
      '<button class="primary" id="send">Send</button>' +
    '</div>' +
    '<div class="hint">Enter to send · Shift+Enter for a newline</div>';

  document.getElementById("back").onclick = showList;
  document.getElementById("invokebar").querySelectorAll("button").forEach(b =>
    b.onclick = () => invoke(b.dataset.focus));
  const composer = document.getElementById("composer");
  document.getElementById("send").onclick = send;
  composer.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

  refresh().then(startPoll);
}

function renderMessages(msgs) {
  const thread = document.getElementById("thread");
  if (!thread) return;
  for (const m of msgs) {
    const div = document.createElement("div");
    div.className = "msg" + (m.role === "mediator" ? " mediator" : "");
    const badge = m.role === "mediator" ? ' <span class="badge">Claude · mediator</span>' : "";
    div.innerHTML =
      '<div class="head"><span class="author">' + esc(m.author) + '</span>' + badge +
      '<span class="time">' + fmtTime(m.ts) + '</span></div>' +
      '<div class="text">' + esc(m.text) + '</div>';
    thread.appendChild(div);
    if (m.ts > lastTs) lastTs = m.ts;
  }
  if (msgs.length) window.scrollTo(0, document.body.scrollHeight);
}

async function refresh() {
  if (view.name !== "thread") return;
  try {
    const { messages } = await api("/council/" + view.topic.id + "/messages?after=" + lastTs);
    if (messages?.length) renderMessages(messages);
  } catch (e) {
    const el = document.getElementById("threadErr");
    if (el) el.textContent = e.message;
  }
}

async function send() {
  const composer = document.getElementById("composer");
  const text = composer.value.trim();
  if (!text) return;
  composer.value = "";
  try {
    await api("/council/" + view.topic.id + "/message", { method: "POST", body: JSON.stringify({ text }) });
    await refresh();
    if (/@claude\b/i.test(text)) invoke();
  } catch (e) { document.getElementById("threadErr").textContent = e.message; composer.value = text; }
}

function setInvoking(on) {
  invoking = on;
  document.querySelectorAll("#invokebar button").forEach(b => b.disabled = on);
  const thread = document.getElementById("thread");
  let ph = document.getElementById("thinking");
  if (on && thread && !ph) {
    ph = document.createElement("div");
    ph.id = "thinking";
    ph.className = "msg mediator thinking";
    ph.textContent = "Claude is thinking…";
    thread.appendChild(ph);
    window.scrollTo(0, document.body.scrollHeight);
  } else if (!on && ph) ph.remove();
}

async function invoke(focus) {
  if (invoking || view.name !== "thread") return;
  setInvoking(true);
  document.getElementById("threadErr").textContent = "";
  try {
    await api("/council/" + view.topic.id + "/invoke", { method: "POST", body: JSON.stringify(focus ? { focus } : {}) });
    setInvoking(false);
    await refresh();
  } catch (e) {
    setInvoking(false);
    const msg = e.status === 503 ? e.message + " Human chat still works — set ANTHROPIC_API_KEY to enable the mediator." : e.message;
    document.getElementById("threadErr").textContent = msg;
  }
}

// ── Polling (pause when tab hidden) ─────────────────────
function startPoll() {
  stopPoll();
  if (document.visibilityState === "visible") pollTimer = setInterval(refresh, 4000);
}
function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && view.name === "thread") { refresh(); startPoll(); }
  else stopPoll();
});

showList();
</script>
</body>
</html>
