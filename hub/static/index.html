<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon-192.png" sizes="192x192">
<title>Nest — Dashboard</title>
<style>
  body{margin:0;background:#f5f5f5;color:#1a1a2e;font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .page{max-width:1040px;margin:0 auto;padding:16px}
  h1{margin:8px 0 4px 0;font-size:24px}
  .lead{color:#6b7280;font-size:13px;margin-bottom:20px}
  h2{margin:24px 0 10px 0;font-size:13px;text-transform:uppercase;color:#6b7280;letter-spacing:.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;text-decoration:none;color:inherit;display:block}
  a.card:hover{border-color:#1a1a2e}
  .row{display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .dot.green{background:#22c55e}
  .dot.amber{background:#eab308}
  .dot.red{background:#ef4444}
  .dot.grey{background:#9ca3af}
  .name{font-size:16px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta{color:#6b7280;font-size:12px;margin-top:6px;line-height:1.5}
  .meta .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
  .stat .k{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .stat .v{font-size:26px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .sub{font-size:12px;color:#6b7280;margin-top:2px}
  .placeholder{color:#9ca3af;font-style:italic;padding:8px 0}
  .err{color:#b91c1c;background:#fee;border:1px solid #fcc;border-radius:6px;padding:10px;margin-bottom:12px}
  .waste-low{color:#15803d}.waste-mid{color:#b45309}.waste-high{color:#b91c1c}
</style>
<script src="/sidebar.js"></script>
</head>
<body>
<div class="page">
  <h1>Dashboard</h1>
  <div class="lead" id="lead">Loading…</div>

  <h2>Fleet</h2>
  <div id="fleet" class="grid"><div class="placeholder">Loading servers…</div></div>

  <h2>Activity (last 24h)</h2>
  <div id="activity" class="stat-row"><div class="placeholder">Loading…</div></div>
</div>

<script>
const TOKEN_KEY = "nest_token";
const t = localStorage.getItem(TOKEN_KEY);
if (!t) location.href = "/login";

const esc = s => String(s ?? "").replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

async function api(path) {
  const res = await fetch(path, { headers: { Authorization: "Bearer " + t } });
  if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); location.href = "/login"; throw new Error("auth"); }
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || ("HTTP " + res.status));
  return body;
}

function statusDot(status) {
  const s = String(status || "").toLowerCase();
  if (s === "running") return "green";
  if (s === "starting" || s === "stopping" || s === "rebuilding") return "amber";
  if (s === "off" || s === "stopped") return "red";
  return "grey";
}

function renderFleet(servers) {
  if (!servers.length) return '<div class="placeholder">No servers.</div>';
  return servers.map(s => `
    <a class="card" href="/server?id=${encodeURIComponent(s.id)}">
      <div class="row">
        <span class="dot ${statusDot(s.status)}" title="${esc(s.status)}"></span>
        <span class="name">${esc(s.name)}</span>
      </div>
      <div class="meta">
        ${esc(s.type || "")} · ${esc(s.location || "")}<br>
        <span class="mono">${esc(s.ip || s.ipv6 || "—")}</span>
      </div>
    </a>`).join("");
}

function wasteClass(pct) { return pct < 5 ? "waste-low" : pct < 15 ? "waste-mid" : "waste-high"; }

function renderActivity(d) {
  const r = d.hub?.requests || {};
  const w = d.hub?.waste || {};
  const lat = r.latencyMs || {};
  const pct = Number(w.wastePct || 0);
  const top = (r.topPaths || [])[0];
  return `
    <div class="stat"><div class="k">Requests</div><div class="v">${r.total || 0}</div><div class="sub">window: ${d.windowMinutes || "?"} min</div></div>
    <div class="stat"><div class="k">Waste</div><div class="v ${wasteClass(pct)}">${pct.toFixed(1)}%</div><div class="sub">errors + dupes</div></div>
    <div class="stat"><div class="k">Errors</div><div class="v">${w.errorRequests || 0}</div><div class="sub">4xx / 5xx</div></div>
    <div class="stat"><div class="k">p95 latency</div><div class="v">${lat.p95 || 0}<span style="font-size:14px;color:#6b7280"> ms</span></div><div class="sub">p50: ${lat.p50 || 0}</div></div>
    ${top ? `<div class="stat"><div class="k">Top path</div><div class="v" style="font-size:14px;font-weight:600" title="${esc(top.path)}">${esc(top.path)}</div><div class="sub">${top.count} hits</div></div>` : ""}
  `;
}

async function load() {
  const [serversRes, activityRes] = await Promise.allSettled([
    api("/api/servers"),
    api("/api/observability/tokens?window=1440"),
  ]);

  const fleetEl = document.getElementById("fleet");
  if (serversRes.status === "fulfilled") {
    const servers = serversRes.value.servers || [];
    fleetEl.innerHTML = renderFleet(servers);
    document.getElementById("lead").textContent = `${servers.length} server${servers.length === 1 ? "" : "s"} in fleet · ${new Date().toLocaleString()}`;
  } else {
    fleetEl.innerHTML = `<div class="err">Fleet: ${esc(serversRes.reason?.message || "failed")}</div>`;
  }

  const actEl = document.getElementById("activity");
  if (activityRes.status === "fulfilled") {
    actEl.innerHTML = renderActivity(activityRes.value);
  } else {
    actEl.innerHTML = `<div class="err">Activity: ${esc(activityRes.reason?.message || "failed")}</div>`;
  }
}

load();
</script>
</body>
</html>
