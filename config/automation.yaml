# config/automation.yaml — Self-running board tuning (AI-55, Lab)
#
# Knobs for the groomer, executor, auto-Done gate, and janitor. Plain data,
# read by scripts/tasks/*.sh and the janitor. Edit here, no apply step — the
# jobs read this file on each invocation. Keep it conservative; widen dials
# (especially the auto_done risk bounds) only after the loop is proven.

# --- Spec-drafting engine (groomer) -------------------------------------
# The groomer drafts specs with `spec_engine`; if that engine errors (auth,
# entitlement, model-not-supported, quota), it falls back to `spec_fallback`
# automatically and logs that it did. Codex is preferred (flat-rate, keeps
# drafting off the Anthropic quota per the token pyramid); Claude is the
# always-available safety net.
spec_engine: codex          # codex | claude
spec_fallback: claude       # used automatically when spec_engine errors
# Model for the codex engine. Leave "" to INHERIT ~/.codex/config.toml's
# `model =` — that file is the single source of truth for the codex model,
# so the groomer never pins its own copy. Set a value here only to override.
codex_model: ""

# How many tickets the groomer keeps stocked in Spec'd. The buffer the
# executor drains from. Janitor's buffer-keeper tops this up when low.
buffer_target: 3

# Topics the groomer must NOT auto-spec. A Backlog ticket whose title or
# description matches any of these is left in Backlog with `needs-human` + a
# comment. Judgment-heavy or trust-boundary work stays with a person.
# Matched as WHOLE words/phrases (\bterm\b, case-insensitive) — so list plural
# variants explicitly. Never use a short fragment like "age" or "auth": they
# would hit "appendage"/"author" everywhere in this project.
spec_deny_list:
  - secret
  - secrets
  - credential
  - credentials
  - password
  - passwords
  - authentication
  - authorization
  - encryption
  - age encryption
  - age-encryption
  - phase 4
  - architecture refactor
  - trust boundary
  - security model
  - vault          # secrets-manager domain (Vaultwarden)
  - vaultwarden

# Auto-Done risk gate. A Review ticket advances to Done when `node --test`
# passes on its branch AND the change is low-risk by ALL the heuristics below.
# Anything that fails a heuristic is held in Review with needs-human + the
# reason. This replaced the old kind-allow-list (chore/refactor only): the kind
# label was a blunt proxy for "important" — a safe feature now auto-closes, and
# only genuinely risky work reaches a human.
#
# NOTE: conventions is deliberately NOT a gate here. The self-audit reflects hub
# *startup* state (not the branch), and its status can't reach `red` without 3
# of 5 checks failing — two already fail on legacy debt — so it carried no real
# signal. It stays an informational health metric (janitor); the merge signal is
# `node --test` + the risk heuristics below.
auto_done:
  # kind/* labels that ALWAYS require a human, regardless of how safe the diff
  # looks (judgment-heavy domains). Empty = risk heuristics alone decide.
  always_human_kinds: []
  # Hold for a human if the diff (main...branch) exceeds either bound.
  max_files: 12
  max_diff_lines: 400
  # Hold if the branch added/changed no test file — a green `node --test` means
  # little if nothing new exercises the change (catches "gamed the gate").
  require_tests_touched: true
  # Hold if any changed path matches one of these (regex, case-insensitive).
  # Trust-boundary + dependency surfaces stay human-gated even when small.
  sensitive_paths:
    - 'routes/auth'
    - 'server\.js'
    - 'config\.env'
    - 'config/'
    - 'bootstrap'
    - 'package(-lock)?\.json'

# --- Executor routing (multi-board separation) ------------------------------
# Team AI hosts more than the Nest roadmap: each autonomous app gets its own
# Linear PROJECT + its own executor (different repo + verify command). The Nest
# executor (run-executor.sh) owns every team-AI ticket EXCEPT those in the
# project ids listed here — so a Spec'd+ai-ready ticket in an app project is
# never picked up and built in /opt/nest. Each app executor positively filters
# to its own project. Add a new app board's project id here when you create it.
# Tickets with NO project stay with the Nest executor.
external_projects:
  - 96a1ecfb-8f67-41b9-9578-272809222db9   # "Energy Hack" → /opt/energyhack, run-eh-executor.sh

# --- Token-window handling --------------------------------------------------
# If the headless engine run shows one of these (case-insensitive) AND made no
# commit, the executor treats it as a TRANSIENT token/rate-limit wall: it reverts
# the ticket to Spec'd (NOT needs-human/blocked) and exits cleanly, so the next
# timer fire retries once the window resets. Subscriptions are use-it-or-lose-it,
# so a drained window is not a ticket failure — it must not strand work in
# Working (where the circuit-breaker would trip at working_max_age_hours) or burn
# a needs-human escalation. The systemd timer IS the resume mechanism. Mirrors
# the EH executor (config/automation-eh.yaml) so both boards recover identically.
token_limit_patterns:
  - 'usage limit'
  - 'rate limit'
  - 'rate_limit'
  - 'overloaded'
  - 'too many requests'
  - '429'
  - '529'
  - 'quota'
  - 'insufficient_quota'

# Circuit-breaker thresholds. The janitor trips the breaker (writes the pause
# flag + mails) on ANY breach. It never auto-clears — a human removes the flag.
circuit_breaker:
  # Spec'd buffer below this for a full janitor pass = starvation signal.
  buffer_min: 1
  # A ticket sitting in Working longer than this = stuck executor.
  working_max_age_hours: 6
  # Window (hours) over which cancel/rework churn is counted.
  cancel_rate_window: 24
  # Max cancels+reworks allowed within that window before tripping.
  cancel_rate_max: 3
  # Token-waste percentage ceiling. NOTE: currently sourced from
  # telemetry-summary.json `hub.waste.wastePct`, which is HUB REQUEST waste, a
  # proxy — not true AI-token waste. Set conservatively high until a real
  # AI-token-waste metric exists, so the breaker doesn't insta-pause on a
  # signal that doesn't mean what it should. Tune down once the metric is real.
  token_waste_pct_max: 80

# Pause flag. When this file exists, the groomer, executor, and auto-Done jobs
# no-op (the janitor still runs, so it can report and the breaker can hold).
# Gitignored (data/ is). A human removes it to resume.
pause_flag: /opt/nest/data/automation.paused

# Where each job appends its JSONL decision log (one object per run/decision).
log_dir: /opt/nest/data/automation

# Where the janitor's circuit-breaker + weekly-digest mail goes. Empty = send
# to SMTP_FROM (the nest mailbox itself). Set to a human address (e.g. your
# inbox) to receive the alerts directly.
alert_email: ""
