# config/automation.yaml — Self-running board tuning (AI-55, Lab)
#
# Knobs for the groomer, executor, auto-Done gate, and janitor. Plain data,
# read by scripts/tasks/*.sh and the janitor. Edit here, no apply step — the
# jobs read this file on each invocation. Keep it conservative; widen dials
# (especially auto_done_allow_kinds) only after the loop is proven.

# --- Spec-drafting engine (groomer) -------------------------------------
# The groomer drafts specs with `spec_engine`; if that engine errors (auth,
# entitlement, model-not-supported, quota), it falls back to `spec_fallback`
# automatically and logs that it did. Codex is preferred (flat-rate, keeps
# drafting off the Anthropic quota per the token pyramid); Claude is the
# always-available safety net.
spec_engine: codex          # codex | claude
spec_fallback: claude       # used automatically when spec_engine errors
# Model for the codex engine. Leave "" to INHERIT ~/.codex/config.toml's
# `model =` — that file is the single source of truth for the codex model,
# so the groomer never pins its own copy. Set a value here only to override.
codex_model: ""

# How many tickets the groomer keeps stocked in Spec'd. The buffer the
# executor drains from. Janitor's buffer-keeper tops this up when low.
buffer_target: 3

# Topics the groomer must NOT auto-spec. A Backlog ticket whose title or
# description matches any of these is left in Backlog with `needs-human` + a
# comment. Judgment-heavy or trust-boundary work stays with a person.
# Matched as WHOLE words/phrases (\bterm\b, case-insensitive) — so list plural
# variants explicitly. Never use a short fragment like "age" or "auth": they
# would hit "appendage"/"author" everywhere in this project.
spec_deny_list:
  - secret
  - secrets
  - credential
  - credentials
  - password
  - passwords
  - authentication
  - authorization
  - encryption
  - age encryption
  - age-encryption
  - phase 4
  - architecture refactor
  - trust boundary
  - security model
  - vault          # secrets-manager domain (Vaultwarden)
  - vaultwarden

# Auto-Done may advance a Review ticket to Done only if its single kind/*
# label is in this list (AND all other gates pass — see auto-done.sh).
# Start with the cheapest, lowest-blast-radius kinds. kind/feature, security,
# secrets, and auth always stay human-gated regardless of this list.
auto_done_allow_kinds:
  - kind/chore
  - kind/refactor

# Circuit-breaker thresholds. The janitor trips the breaker (writes the pause
# flag + mails) on ANY breach. It never auto-clears — a human removes the flag.
circuit_breaker:
  # Spec'd buffer below this for a full janitor pass = starvation signal.
  buffer_min: 1
  # A ticket sitting in Working longer than this = stuck executor.
  working_max_age_hours: 6
  # Window (hours) over which cancel/rework churn is counted.
  cancel_rate_window: 24
  # Max cancels+reworks allowed within that window before tripping.
  cancel_rate_max: 3
  # Token-waste percentage ceiling. NOTE: currently sourced from
  # telemetry-summary.json `hub.waste.wastePct`, which is HUB REQUEST waste, a
  # proxy — not true AI-token waste. Set conservatively high until a real
  # AI-token-waste metric exists, so the breaker doesn't insta-pause on a
  # signal that doesn't mean what it should. Tune down once the metric is real.
  token_waste_pct_max: 80

# Pause flag. When this file exists, the groomer, executor, and auto-Done jobs
# no-op (the janitor still runs, so it can report and the breaker can hold).
# Gitignored (data/ is). A human removes it to resume.
pause_flag: /opt/nest/data/automation.paused

# Where each job appends its JSONL decision log (one object per run/decision).
log_dir: /opt/nest/data/automation

# Where the janitor's circuit-breaker + weekly-digest mail goes. Empty = send
# to SMTP_FROM (the nest mailbox itself). Set to a human address (e.g. your
# inbox) to receive the alerts directly.
alert_email: ""
