#cloud-config
# Minimal: create claude user + DNS64 for IPv6-only networking.
# Everything else is handled by bootstrap.sh.
users:
  - name: claude
    groups: users, admin, sudo
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM531k1GDcpriv5YmH7x8yNN8m/VCMmMxZqAmHe8t7hR theNest

# DNS64 via nat64.net — required for IPv6-only servers to reach IPv4 hosts (GitHub, Docker Hub, npm)
write_files:
  - path: /etc/netplan/99-dns64.yaml
    content: |
      network:
        version: 2
        ethernets:
          eth0:
            nameservers:
              addresses:
                - 2a01:4f9:c010:3f02::1
                - 2a00:1098:2b::1
                - 2a01:4f8:c2c:123f::1

runcmd:
  - netplan apply
  - chown -R claude:claude /home/claude
